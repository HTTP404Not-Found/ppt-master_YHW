<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><filter id="imgShadow08" width="120%" height="120%" x="-10%" y="-10%"><feGaussianBlur in="SourceAlpha" stdDeviation="5"/><feOffset dx="0" dy="3"/><feComponentTransfer><feFuncA slope=".2" type="linear"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1280" height="720" fill="#F7F2E8"/><g id="header"><text x="60" y="50" fill="#9B948B" font-family="KaiTi, STKaiti, Georgia, serif" font-size="14" letter-spacing="3">CHAPTER 03 · 诗意之色（下）</text><line x1="60" x2="290" y1="62" y2="62" stroke="#C99E62" stroke-width="2"/><text x="60" y="108" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="38" font-weight="bold" letter-spacing="3">画眉深青 · 相思成灰</text><text x="60" y="140" fill="#7A7068" font-family="KaiTi, STKaiti, Georgia, serif" font-size="18" letter-spacing="2">一寸相思一寸灰 · 一画青黛映春山</text></g><line x1="640" x2="640" y1="180" y2="660" stroke="#D7CEB9" stroke-dasharray="4 4" stroke-width="1"/><g id="color-daiqing"><g transform="translate(60,180) translate(0,0)"><rect width="288" height="208" x="-4" y="-4" fill="#EDE5D3" stroke="#3D4A5A" stroke-width="1"/><image width="280" height="200" x="0" y="0" filter="url(#imgShadow08)" href="../images/640_12.png" preserveAspectRatio="xMidYMid slice"/><text x="140" y="220" fill="#9B948B" font-family="KaiTi, STKaiti, Georgia, serif" font-size="13" text-anchor="middle">黛青 · 画眉深色</text></g><g transform="translate(60,180) translate(310,0)"><rect width="260" height="200" x="0" y="0" fill="#3D4A5A" rx="4"/><rect width="240" height="180" x="10" y="10" fill="none" stroke="#F7F2E8" stroke-opacity=".6" stroke-width="1"/><text x="130" y="80" fill="#F7F2E8" font-family="KaiTi, STKaiti, Georgia, serif" font-size="56" font-weight="bold" letter-spacing="4" text-anchor="middle">黛青</text><text x="130" y="130" fill="#F7F2E8" font-family="KaiTi, STKaiti, Georgia, serif" font-size="16" letter-spacing="2" text-anchor="middle">蓝草提取</text><text x="130" y="170" fill="#F7F2E8" font-family="Arial" font-size="13" letter-spacing="3" text-anchor="middle">#3D4A5A</text></g><g transform="translate(60,180) translate(0,260)"><use width="24" height="24" x="0" y="0" fill="#3D4A5A" data-icon="tabler-filled/quote"/><text x="34" y="18" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="19" font-weight="bold">眉黛青颦 · 莲脸生春</text><text x="34" y="46" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="19" font-weight="bold">倾国倾城 · 崔莺莺之容</text><text x="34" y="74" fill="#9B948B" font-family="KaiTi, STKaiti, Georgia, serif" font-size="15" font-style="italic">— 元 · 王实甫《西厢记》</text></g><g transform="translate(60,180) translate(0,370)"><rect width="570" height="78" x="0" y="0" fill="#EDE5D3" rx="6"/><g transform="translate(20,20)"><use width="20" height="20" x="0" y="0" fill="#3D4A5A" data-icon="tabler-filled/leaf"/><text x="30" y="16" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="17" font-weight="bold">染料 · 青出于蓝</text></g><text x="20" y="64" fill="#7A7068" font-family="KaiTi, STKaiti, Georgia, serif" font-size="16" letter-spacing="1">从蓝草中提取青黛，古代女子画眉常用之色</text></g></g><g id="color-xiangsi"><g transform="translate(670,180) translate(0,0)"><rect width="288" height="208" x="-4" y="-4" fill="#EDE5D3" stroke="#A69E98" stroke-width="1"/><image width="280" height="200" x="0" y="0" filter="url(#imgShadow08)" href="../images/640_13.png" preserveAspectRatio="xMidYMid slice"/><text x="140" y="220" fill="#9B948B" font-family="KaiTi, STKaiti, Georgia, serif" font-size="13" text-anchor="middle">相思灰 · 想象之色</text></g><g transform="translate(670,180) translate(310,0)"><rect width="240" height="200" x="0" y="0" fill="#A69E98" rx="4"/><rect width="220" height="180" x="10" y="10" fill="none" stroke="#F7F2E8" stroke-opacity=".6" stroke-width="1"/><text x="120" y="80" fill="#F7F2E8" font-family="KaiTi, STKaiti, Georgia, serif" font-size="48" font-weight="bold" letter-spacing="4" text-anchor="middle">相思</text><text x="120" y="128" fill="#F7F2E8" font-family="KaiTi, STKaiti, Georgia, serif" font-size="48" font-weight="bold" letter-spacing="4" text-anchor="middle">灰</text><text x="120" y="170" fill="#F7F2E8" font-family="Arial" font-size="13" letter-spacing="3" text-anchor="middle">#A69E98</text></g><g transform="translate(670,180) translate(0,260)"><use width="24" height="24" x="0" y="0" fill="#B04A5C" data-icon="tabler-filled/heart"/><text x="34" y="18" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="19" font-weight="bold">春心莫共花争发</text><text x="34" y="46" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="19" font-weight="bold">一寸相思一寸灰</text><text x="34" y="74" fill="#9B948B" font-family="KaiTi, STKaiti, Georgia, serif" font-size="15" font-style="italic">— 唐 · 李商隐 · 催生相思灰色名</text></g><g transform="translate(670,180) translate(0,370)"><rect width="550" height="78" x="0" y="0" fill="#EDE5D3" rx="6"/><g transform="translate(20,20)"><use width="20" height="20" x="0" y="0" fill="#7A7068" data-icon="tabler-filled/palette"/><text x="30" y="16" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="17" font-weight="bold">配方 · 染出浅灰</text></g><text x="20" y="64" fill="#7A7068" font-family="KaiTi, STKaiti, Georgia, serif" font-size="16" letter-spacing="1">茶叶 / 石榴皮作染料，以少许皂矾作媒染剂</text></g></g><g id="bottom-strip" transform="translate(60,660)"><rect width="1160" height="32" x="0" y="0" fill="#EDE5D3" rx="16"/><text x="30" y="21" fill="#7A7068" font-family="KaiTi, STKaiti, Georgia, serif" font-size="15">若说颜色有情 · 相思灰则最为情深</text><text x="1130" y="21" fill="#9B948B" font-family="KaiTi, STKaiti, Georgia, serif" font-size="13" text-anchor="end">08 / 12</text></g></svg>