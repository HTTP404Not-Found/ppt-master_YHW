<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><filter id="imgShadow07" width="120%" height="120%" x="-10%" y="-10%"><feGaussianBlur in="SourceAlpha" stdDeviation="5"/><feOffset dx="0" dy="3"/><feComponentTransfer><feFuncA slope=".2" type="linear"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1280" height="720" fill="#F7F2E8"/><g id="header"><text x="60" y="50" fill="#9B948B" font-family="KaiTi, STKaiti, Georgia, serif" font-size="14" letter-spacing="3">CHAPTER 03 · 诗意之色（上）</text><line x1="60" x2="290" y1="62" y2="62" stroke="#C99E62" stroke-width="2"/><text x="60" y="108" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="38" font-weight="bold" letter-spacing="3">朝霞初染 · 饮酒颜酡</text><text x="60" y="140" fill="#7A7068" font-family="KaiTi, STKaiti, Georgia, serif" font-size="18" letter-spacing="2">植物染的魅力 · 不仅在于色彩 · 更在于其承载的东方意境</text></g><line x1="640" x2="640" y1="180" y2="660" stroke="#D7CEB9" stroke-dasharray="4 4" stroke-width="1"/><g id="color-yinhong"><g transform="translate(60,180) translate(0,0)"><rect width="288" height="208" x="-4" y="-4" fill="#EDE5D3" stroke="#E49AA5" stroke-width="1"/><image width="280" height="200" x="0" y="0" filter="url(#imgShadow07)" href="../images/640_10.png" preserveAspectRatio="xMidYMid slice"/><text x="140" y="220" fill="#9B948B" font-family="KaiTi, STKaiti, Georgia, serif" font-size="13" text-anchor="middle">黄荣华 · 银红丝巾</text></g><g transform="translate(60,180) translate(310,0)"><rect width="260" height="200" x="0" y="0" fill="#E49AA5" rx="4"/><rect width="240" height="180" x="10" y="10" fill="none" stroke="#F7F2E8" stroke-opacity=".6" stroke-width="1"/><text x="130" y="78" fill="#F7F2E8" font-family="KaiTi, STKaiti, Georgia, serif" font-size="44" font-weight="bold" letter-spacing="6" text-anchor="middle">银红</text><text x="130" y="130" fill="#F7F2E8" font-family="KaiTi, STKaiti, Georgia, serif" font-size="18" letter-spacing="2" text-anchor="middle">又叫 · 霞影纱</text><text x="130" y="170" fill="#F7F2E8" font-family="Arial" font-size="13" letter-spacing="3" text-anchor="middle">#E49AA5</text></g><g transform="translate(60,180) translate(0,260)"><use width="24" height="24" x="0" y="0" fill="#E49AA5" data-icon="tabler-filled/flower"/><text x="34" y="18" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="19" font-weight="bold">朝霞初染 · 桃瓣含霜</text><text x="34" y="46" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="19" font-weight="bold">黛玉窗前 · 霞影纱痕</text><text x="34" y="74" fill="#9B948B" font-family="KaiTi, STKaiti, Georgia, serif" font-size="15" font-style="italic">— 《红楼梦》 · 绛珠仙草泪染胭脂</text></g><g transform="translate(60,180) translate(0,370)"><rect width="570" height="78" x="0" y="0" fill="#EDE5D3" rx="6"/><g transform="translate(20,20)"><use width="20" height="20" x="0" y="0" fill="#B04A5C" data-icon="tabler-filled/palette"/><text x="30" y="16" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="17" font-weight="bold">配方 · 三料配制</text></g><text x="20" y="64" fill="#7A7068" font-family="KaiTi, STKaiti, Georgia, serif" font-size="16" letter-spacing="1">红花 + 苏木 + 朱砂，以明矾作媒染剂</text></g></g><g id="color-tuose"><g transform="translate(670,180) translate(0,0)"><rect width="288" height="208" x="-4" y="-4" fill="#EDE5D3" stroke="#C86868" stroke-width="1"/><image width="280" height="200" x="0" y="0" filter="url(#imgShadow07)" href="../images/640_11.png" preserveAspectRatio="xMidYMid slice"/><text x="140" y="220" fill="#9B948B" font-family="KaiTi, STKaiti, Georgia, serif" font-size="13" text-anchor="middle">电影《霸王别姬》剧照</text></g><g transform="translate(670,180) translate(310,0)"><rect width="240" height="200" x="0" y="0" fill="#C86868" rx="4"/><rect width="220" height="180" x="10" y="10" fill="none" stroke="#F7F2E8" stroke-opacity=".6" stroke-width="1"/><text x="120" y="85" fill="#F7F2E8" font-family="KaiTi, STKaiti, Georgia, serif" font-size="56" font-weight="bold" letter-spacing="4" text-anchor="middle">酡色</text><text x="120" y="130" fill="#F7F2E8" font-family="KaiTi, STKaiti, Georgia, serif" font-size="16" letter-spacing="2" text-anchor="middle">饮酒朱颜</text><text x="120" y="170" fill="#F7F2E8" font-family="Arial" font-size="13" letter-spacing="3" text-anchor="middle">#C86868</text></g><g transform="translate(670,180) translate(0,260)"><use width="24" height="24" x="0" y="0" fill="#C86868" data-icon="tabler-filled/quote"/><text x="34" y="18" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="19" font-weight="bold">美人欲醉朱颜酡</text><text x="34" y="46" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="19" font-weight="bold">贵妃醉酒 · 何等妩媚</text><text x="34" y="74" fill="#9B948B" font-family="KaiTi, STKaiti, Georgia, serif" font-size="15" font-style="italic">— 李白《前有一尊酒行》· 屈原《招魂》</text></g><g transform="translate(670,180) translate(0,370)"><rect width="550" height="78" x="0" y="0" fill="#EDE5D3" rx="6"/><g transform="translate(20,20)"><use width="20" height="20" x="0" y="0" fill="#B04A5C" data-icon="tabler-filled/palette"/><text x="30" y="16" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="17" font-weight="bold">配方 · 多物皆成</text></g><text x="20" y="64" fill="#7A7068" font-family="KaiTi, STKaiti, Georgia, serif" font-size="16" letter-spacing="1">红蓝 / 苏木 / 茜草 / 五倍子 / 茶叶，明矾媒染</text></g></g><g id="bottom-strip" transform="translate(60,660)"><rect width="1160" height="32" x="0" y="0" fill="#EDE5D3" rx="16"/><text x="30" y="21" fill="#7A7068" font-family="KaiTi, STKaiti, Georgia, serif" font-size="15">《红楼梦》有言 · 软烟罗四色 · 雨过天青 · 秋香 · 松绿 · 银红</text><text x="1130" y="21" fill="#9B948B" font-family="KaiTi, STKaiti, Georgia, serif" font-size="13" text-anchor="end">07 / 12</text></g></svg>