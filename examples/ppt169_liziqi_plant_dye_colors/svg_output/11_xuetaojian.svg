<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><linearGradient id="accentBar11" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" stop-color="#C99E62"/><stop offset="100%" stop-color="#E49AA5"/></linearGradient><filter id="imgShadow11" width="120%" height="120%" x="-10%" y="-10%"><feGaussianBlur in="SourceAlpha" stdDeviation="6"/><feOffset dx="0" dy="4"/><feComponentTransfer><feFuncA slope=".22" type="linear"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1280" height="720" fill="#F7F2E8"/><g id="header"><text x="60" y="50" fill="#9B948B" font-family="KaiTi, STKaiti, Georgia, serif" font-size="14" letter-spacing="3">CHAPTER 04 · 风雅可复刻</text><line x1="60" x2="290" y1="62" y2="62" stroke="#C99E62" stroke-width="2"/><text x="60" y="108" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="40" font-weight="bold" letter-spacing="3">薛涛笺 · 千年风雅可复刻</text><rect width="120" height="3" x="60" y="120" fill="url(#accentBar11)"/><text x="60" y="156" fill="#7A7068" font-family="KaiTi, STKaiti, Georgia, serif" font-size="18" letter-spacing="2">一纸芙蓉红 · 千年还有魂</text></g><g id="left-image" transform="translate(60,190)"><rect width="392" height="392" x="-6" y="-6" fill="#EDE5D3" stroke="#C99E62" stroke-width="1"/><image width="380" height="380" x="0" y="0" filter="url(#imgShadow11)" href="../images/640_17.png" preserveAspectRatio="xMidYMid slice"/><rect width="392" height="30" x="-6" y="380" fill="#3A3530"/><text x="190" y="400" fill="#F7F2E8" font-family="KaiTi, STKaiti, Georgia, serif" font-size="13" letter-spacing="2" text-anchor="middle">电视剧《梦华录》· 薛涛笺意象</text></g><g id="middle-content" transform="translate(500,190)"><rect width="440" height="400" x="0" y="0" fill="#FFF" stroke="#D7CEB9" stroke-width="1" rx="12"/><g transform="translate(30,30)"><use width="28" height="28" x="0" y="0" fill="#E49AA5" data-icon="tabler-filled/flower"/><text x="42" y=