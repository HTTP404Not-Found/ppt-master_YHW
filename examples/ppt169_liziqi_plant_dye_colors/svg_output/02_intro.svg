<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><linearGradient id="bgGrad02" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" stop-color="#F7F2E8"/><stop offset="100%" stop-color="#EDE5D3"/></linearGradient><filter id="imgShadow02" width="120%" height="120%" x="-10%" y="-10%"><feGaussianBlur in="SourceAlpha" stdDeviation="6"/><feOffset dx="0" dy="4"/><feComponentTransfer><feFuncA slope=".22" type="linear"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1280" height="720" fill="url(#bgGrad02)"/><g id="header"><text x="60" y="60" fill="#9B948B" font-family="KaiTi, STKaiti, Georgia, serif" font-size="14" letter-spacing="3">PROLOGUE · 引子</text><line x1="60" x2="200" y1="72" y2="72" stroke="#C99E62" stroke-width="2"/></g><g id="main-image" transform="translate(80,110)"><rect width="312" height="512" x="-6" y="-6" fill="#EDE5D3" stroke="#C99E62" stroke-width="1"/><image width="300" height="500" x="0" y="0" filter="url(#imgShadow02)" href="../images/640_4.png" preserveAspectRatio="xMidYMid slice"/><rect width="312" height="30" x="-6" y="500" fill="#3A3530"/><text x="150" y="520" fill="#F7F2E8" font-family="KaiTi, STKaiti, Georgia, serif" font-size="13" letter-spacing="2" text-anchor="middle">李子柒 · 春晚战袍</text></g><g id="right-content" transform="translate(460,110)"><text x="0" y="40" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="50" font-weight="bold" letter-spacing="4">最动人的色彩</text><rect width="80" height="3" x="0" y="60" fill="#B04A5C"/><text x="0" y="105" fill="#6B9AAE" font-family="KaiTi, STKaiti, Georgia, serif" font-size="26" letter-spacing="2">不在潘通色卡里</text><text x="0" y="145" fill="#6F8F75" font-family="KaiTi, STKaiti, Georgia, serif" font-size="26" letter-spacing="2">而早已藏在山河草木之间</text><rect width="720" height="1" x="0" y="180" fill="#D7CEB9"/><g transform="translate(0,210)"><use width="28" height="28" x="0" y="0" fill="#C99E62" data-icon="tabler-filled/sparkles"/><text x="44" y="22" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="22" font-weight="bold">2025 央视春晚《迎福》</text><text x="44" y="54" fill="#7A7068" font-family="KaiTi, STKaiti, Georgia, serif" font-size="20" letter-spacing="1">李子柒身穿黄、青渐变色长裙翩然起舞，</text><text x="44" y="82" fill="#7A7068" font-family="KaiTi, STKaiti, Georgia, serif" font-size="20" letter-spacing="1">化身「蝴蝶仙子」，惊艳亮相。</text></g><g transform="translate(0,320)"><use width="28" height="28" x="0" y="0" fill="#6F8F75" data-icon="tabler-filled/leaf"/><text x="44" y="22" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="22" font-weight="bold">13 项非遗技艺集于一身</text><text x="44" y="54" fill="#7A7068" font-family="KaiTi, STKaiti, Georgia, serif" font-size="20" letter-spacing="1">植物染 · 青神竹编 · 螺钿 · 成都漆艺</text><text x="44" y="82" fill="#7A7068" font-family="KaiTi, STKaiti, Georgia, serif" font-size="20" letter-spacing="1">羌绣 · 英山缠花 …… 十三项非遗同辉。</text></g><g transform="translate(0,430)"><use width="28" height="28" x="0" y="0" fill="#6B9AAE" data-icon="tabler-filled/droplet"/><text x="44" y="22" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="22" font-weight="bold">一袭战袍，染尽山河</text><text x="44" y="54" fill="#7A7068" font-family="KaiTi, STKaiti, Georgia, serif" font-size="20" letter-spacing="1">黄青渐变 · 寓意中华土地 · 生生不息。</text></g></g><g id="footer"><line x1="60" x2="1220" y1="670" y2="670" stroke="#D7CEB9" stroke-width="1"/><text x="60" y="695" fill="#9B948B" font-family="KaiTi, STKaiti, Georgia, serif" font-size="13">裁云织月 · 草木成诗</text><text x="1220" y="695" fill="#9B948B" font-family="KaiTi, STKaiti, Georgia, serif" font-size="13" text-anchor="end">02 / 12</text></g></svg>