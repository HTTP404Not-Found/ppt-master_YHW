<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><linearGradient id="huangluGrad" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" stop-color="#E0BC7E"/><stop offset="100%" stop-color="#C99E62"/></linearGradient><linearGradient id="malanGrad" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" stop-color="#8BA998"/><stop offset="100%" stop-color="#6F8F75"/></linearGradient><linearGradient id="diaoyanVert" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" stop-color="#C99E62" stop-opacity=".9"/><stop offset="100%" stop-color="#6F8F75" stop-opacity=".9"/></linearGradient><filter id="cardShadow03" width="120%" height="120%" x="-10%" y="-10%"><feGaussianBlur in="SourceAlpha" stdDeviation="5"/><feOffset dx="0" dy="3"/><feComponentTransfer><feFuncA slope=".15" type="linear"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1280" height="720" fill="#F7F2E8"/><g id="header"><text x="60" y="50" fill="#9B948B" font-family="KaiTi, STKaiti, Georgia, serif" font-size="14" letter-spacing="3">CHAPTER 01 · 战袍解密</text><line x1="60" x2="240" y1="62" y2="62" stroke="#C99E62" stroke-width="2"/><text x="60" y="108" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="38" font-weight="bold" letter-spacing="3">五方正色 · 手工吊染</text><text x="60" y="140" fill="#7A7068" font-family="KaiTi, STKaiti, Georgia, serif" font-size="20" letter-spacing="2">黄为土地 · 青为春天 · 一绳一染，成就水墨般的渐变</text></g><g id="color-huanglu" filter="url(#cardShadow03)" transform="translate(60,180)"><rect width="360" height="300" x="0" y="0" fill="#FFF" rx="10"/><rect width="360" height="110" x="0" y="0" fill="url(#huangluGrad)" rx="10"/><rect width="360" height="10" x="0" y="100" fill="url(#huangluGrad)"/><text x="24" y="52" fill="#F7F2E8" font-family="KaiTi, STKaiti, Georgia, serif" font-size="34" font-weight="bold" letter-spacing="4">黄栌黄</text><text x="24" y="86" fill="#F7F2E8" font-family="KaiTi, STKaiti, Georgia, serif" font-size="15" letter-spacing="3">HuangLu Yellow · #C99E62</text><g transform="translate(24,145)"><use width="22" height="22" x="0" y="0" fill="#C99E62" data-icon="tabler-filled/leaf"/><text x="34" y="17" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="19" font-weight="bold">取自 · 湖北神农架黄栌</text></g><text x="24" y="198" fill="#7A7068" font-family="KaiTi, STKaiti, Georgia, serif" font-size="18" letter-spacing="1">五方正色之「土」</text><text x="24" y="226" fill="#7A7068" font-family="KaiTi, STKaiti, Georgia, serif" font-size="18" letter-spacing="1">象征广袤深厚的中华大地</text><rect width="312" height="1" x="24" y="248" fill="#D7CEB9"/><text x="24" y="275" fill="#9B948B" font-family="KaiTi, STKaiti, Georgia, serif" font-size="16" font-style="italic">黄帝制玄冠黄裳 · 以草木之汁染之</text></g><g id="color-malan" filter="url(#cardShadow03)" transform="translate(440,180)"><rect width="360" height="300" x="0" y="0" fill="#FFF" rx="10"/><rect width="360" height="110" x="0" y="0" fill="url(#malanGrad)" rx="10"/><rect width="360" height="10" x="0" y="100" fill="url(#malanGrad)"/><text x="24" y="52" fill="#F7F2E8" font-family="KaiTi, STKaiti, Georgia, serif" font-size="34" font-weight="bold" letter-spacing="4">马兰青</text><text x="24" y="86" fill="#F7F2E8" font-family="KaiTi, STKaiti, Georgia, serif" font-size="15" letter-spacing="3">MaLan Green · #6F8F75</text><g transform="translate(24,145)"><use width="22" height="22" x="0" y="0" fill="#6F8F75" data-icon="tabler-filled/flower"/><text x="34" y="17" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="19" font-weight="bold">取自 · 江南初春的马兰草</text></g><text x="24" y="198" fill="#7A7068" font-family="KaiTi, STKaiti, Georgia, serif" font-size="18" letter-spacing="1">五方正色之「春」</text><text x="24" y="226" fill="#7A7068" font-family="KaiTi, STKaiti, Georgia, serif" font-size="18" letter-spacing="1">代表万物初生、生生不息</text><rect width="312" height="1" x="24" y="248" fill="#D7CEB9"/><text x="24" y="275" fill="#9B948B" font-family="KaiTi, STKaiti, Georgia, serif" font-size="16" font-style="italic">黄青渐变 · 寓中华土地 · 生生不息</text></g><g id="image-diaoyan" transform="translate(820,180)"><rect width="412" height="312" x="-6" y="-6" fill="#EDE5D3" stroke="#C99E62" stroke-width="1"/><image width="400" height="300" x="0" y="0" filter="url(#cardShadow03)" href="../images/640.jpg" preserveAspectRatio="xMidYMid slice"/><rect width="412" height="28" x="-6" y="300" fill="#3A3530"/><text x="200" y="319" fill="#F7F2E8" font-family="KaiTi, STKaiti, Georgia, serif" font-size="13" letter-spacing="2" text-anchor="middle">李子柒与黄荣华协作吊染</text></g><g id="diaoyan-process" transform="translate(60,520)"><rect width="1160" height="136" x="0" y="0" fill="#EDE5D3" rx="10"/><g transform="translate(24,18)"><use width="24" height="24" x="0" y="0" fill="#6B9AAE" data-icon="tabler-filled/droplet"/><text x="34" y="18" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="20" font-weight="bold">手工吊染 · 水墨般过渡</text><text x="800" y="18" fill="#9B948B" font-family="KaiTi, STKaiti, Georgia, serif" font-size="14" letter-spacing="2" text-anchor="end">容不得半点差错 · 耐心与技艺的双重考验</text></g><line x1="80" x2="1080" y1="85" y2="85" stroke="#D7CEB9" stroke-width="2"/><g transform="translate(80,85)"><circle cx="0" cy="0" r="18" fill="#C99E62"/><text x="0" y="5" fill="#F7F2E8" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">01</text><text x="0" y="34" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="16" font-weight="bold" text-anchor="middle">绳起布吊</text></g><g transform="translate(330,85)"><circle cx="0" cy="0" r="18" fill="#C99E62"/><text x="0" y="5" fill="#F7F2E8" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">02</text><text x="0" y="34" fill="#3A3530" font-family="KaiTi, STKaiti, Georgia, serif" font-size="16" font-weight="bold" text-anchor="middle">浸入染料</text></g><g transform="translate(580,85)"><circle cx="0" cy="0" r="18" fill="#C99E62"