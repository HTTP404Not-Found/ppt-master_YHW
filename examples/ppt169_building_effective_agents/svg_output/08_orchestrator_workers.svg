<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><filter id="cardShadow" width="140%" height="140%" x="-15%" y="-15%"><feGaussianBlur in="SourceAlpha" stdDeviation="10"/><feOffset dx="0" dy="4" result="offsetBlur"/><feFlood flood-color="#000" flood-opacity=".12" result="shadowColor"/><feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1280" height="720" fill="#0F1117"/><g id="header"><rect width="4" height="32" x="60" y="40" fill="#5B9BD5" rx="2"/><text x="78" y="66" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="bold">Workflow: Orchestrator-Workers</text></g><g id="diagram"><image width="1120" height="280" x="80" y="88" href="../images/image_4.png" preserveAspectRatio="xMidYMid meet"/></g><g id="how-it-works"><rect width="560" height="275" x="60" y="385" fill="#1A1D27" stroke="#2D3348" stroke-width="1" filter="url(#cardShadow)" rx="12"/><use width="24" height="24" x="84" y="410" fill="#5B9BD5" data-icon="chunk/cog"/><text x="118" y="430" fill="#5B9BD5" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="bold">How It Works</text><text x="84" y="466" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">A central LLM dynamically:</text><rect width="8" height="8" x="100" y="484" fill="#5B9BD5" rx="4"/><text x="120" y="493" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">Breaks down tasks into subtasks</text><rect width="8" height="8" x="100" y="512" fill="#5B9BD5" rx="4"/><text x="120" y="521" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">Delegates to worker LLMs</text><rect width="8" height="8" x="100" y="540" fill="#5B9BD5" rx="4"/><text x="120" y="549" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">Synthesizes their results</text><rect width="512" height="1" x="84" y="572" fill="#2D3348" fill-opacity=".4"/><use width="18" height="18" x="84" y="588" fill="#E8B87D" data-icon="chunk/lightbulb"/><text x="112" y="603" fill="#E8B87D" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="bold">Key difference from parallelization:</text><text x="112" y="623" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">Subtasks are not pre-defined, but determined</text><text x="112" y="641" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">dynamically by the orchestrator based on input</text></g><g id="use-cases"><rect width="570" height="275" x="650" y="385" fill="#1A1D27" stroke="#2D3348" stroke-width="1" filter="url(#cardShadow)" rx="12"/><use width="24" height="24" x="674" y="410" fill="#D4845A" data-icon="chunk/cube"/><text x="708" y="430" fill="#D4845A" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="bold">Use Cases</text><text x="674" y="466" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">Complex tasks where subtasks</text><text x="674" y="488" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">can&apos;t be predicted in advance.</text><rect width="522" height="1" x="674" y="510" fill="#2D3348" fill-opacity=".4"/><rect width="522" height="68" x="674" y="530" fill="#0F1117" stroke="#2D3348" stroke-width="1" rx="8"/><use width="20" height="20" x="690" y="548" fill="#D4845A" data-icon="chunk/code"/><text x="720" y="558" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="bold">Multi-file Code Changes</text><text x="720" y="580" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13">Number and nature of changes depend on the task</text><rect width="522" height="36" x="674" y="612" fill="#0F1117" stroke="#2D3348" stroke-width="1" rx="8"/><use width="20" height="20" x="690" y="620" fill="#D4845A" data-icon="chunk/server"/><text x="720" y="636" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="bold">Multi-source Search &amp; Analysis</text></g><g id="footer"><text x="1220" y="700" fill="#6B7280" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="end">08</text></g></svg>