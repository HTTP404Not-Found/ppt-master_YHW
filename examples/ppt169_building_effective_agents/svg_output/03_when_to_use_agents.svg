<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><filter id="cardShadow" width="140%" height="140%" x="-15%" y="-15%"><feGaussianBlur in="SourceAlpha" stdDeviation="10"/><feOffset dx="0" dy="4" result="offsetBlur"/><feFlood flood-color="#000" flood-opacity=".12" result="shadowColor"/><feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter><linearGradient id="successGrad" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" stop-color="#4ADE80" stop-opacity=".15"/><stop offset="100%" stop-color="#4ADE80" stop-opacity="0"/></linearGradient></defs><rect width="1280" height="720" fill="#0F1117"/><g id="header"><rect width="4" height="36" x="60" y="50" fill="#D4845A" rx="2"/><text x="78" y="80" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="bold">When (and When Not) to Use Agents</text></g><g id="principle-bar"><rect width="1160" height="52" x="60" y="110" fill="#1A1D27" stroke="#2D3348" stroke-width="1" rx="10"/><use width="28" height="28" x="80" y="122" fill="#E8B87D" data-icon="chunk/lightbulb"/><text x="118" y="143" fill="#E8B87D" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold">Core Principle:</text><text x="270" y="143" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">Find the simplest solution possible, and only increase complexity when needed.</text></g><g id="card-single-llm"><rect width="360" height="285" x="60" y="185" fill="#1A1D27" stroke="#2D3348" stroke-width="1" filter="url(#cardShadow)" rx="12"/><rect width="360" height="6" x="60" y="185" fill="#4ADE80" rx="3"/><use width="32" height="32" x="84" y="212" fill="#4ADE80" data-icon="chunk/terminal"/><text x="128" y="237" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="bold">Single LLM Calls</text><text x="84" y="270" fill="#4ADE80" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="bold">START HERE</text><rect width="312" height="1" x="84" y="290" fill="#2D3348" fill-opacity=".5"/><text x="84" y="318" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">Optimized prompts with retrieval</text><text x="84" y="340" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">and in-context examples</text><text x="84" y="375" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">✓ Lowest latency</text><text x="84" y="398" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">✓ Lowest cost</text><text x="84" y="421" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">✓ Sufficient for most apps</text><text x="84" y="450" fill="#6B7280" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13">Complexity: ●○○</text></g><g id="card-workflows"><rect width="360" height="285" x="450" y="185" fill="#1A1D27" stroke="#2D3348" stroke-width="1" filter="url(#cardShadow)" rx="12"/><rect width="360" height="6" x="450" y="185" fill="#5B9BD5" rx="3"/><use width="32" height="32" x="474" y="212" fill="#5B9BD5" data-icon="chunk/code"/><text x="518" y="237" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="bold">Workflows</text><text x="474" y="270" fill="#5B9BD5" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="bold">WHEN MORE COMPLEXITY IS WARRANTED</text><rect width="312" height="1" x="474" y="290" fill="#2D3348" fill-opacity=".5"/><text x="474" y="318" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">LLMs + tools orchestrated</text><text x="474" y="340" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">through predefined code paths</text><text x="474" y="375" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">✓ Predictability</text><text x="474" y="398" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">✓ Consistency</text><text x="474" y="421" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">✓ Well-defined tasks</text><text x="474" y="450" fill="#6B7280" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13">Complexity: ●●○</text></g><g id="card-agents"><rect width="380" height="285" x="840" y="185" fill="#1A1D27" stroke="#2D3348" stroke-width="1" filter="url(#cardShadow)" rx="12"/><rect width="380" height="6" x="840" y="185" fill="#D4845A" rx="3"/><use width="32" height="32" x="864" y="212" fill="#D4845A" data-icon="chunk/robot"/><text x="908" y="237" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="bold">Agents</text><text x="864" y="270" fill="#D4845A" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="bold">WHEN FLEXIBILITY IS NEEDED</text><rect width="332" height="1" x="864" y="290" fill="#2D3348" fill-opacity=".5"/><text x="864" y="318" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">LLMs dynamically direct their</text><text x="864" y="340" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">own processes and tool usage</text><text x="864" y="375" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">✓ Flexibility at scale</text><text x="864" y="398" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">✓ Model-driven decisions</text><text x="864" y="421" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">✓ Open-ended problems</text><text x="864" y="450" fill="#6B7280" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13">Complexity: ●●●</text></g><polygon fill="#2D3348" points="424 328 440 318 440 338"/><polygon fill="#2D3348" points="814 328 830 318 830 338"/><g id="framework-note"><rect width="1160" height="140" x="60" y="500" fill="#1A1D27" stroke="#2D3348" stroke-width="1" rx="12"/><use width="28" height="28" x="84" y="524" fill="#E8B87D" data-icon="chunk/toolbox"/><text x="124" y="546" fill="#E8B87D" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="bold">On Frameworks</text><text x="84" y="580" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">Start by using LLM APIs directly — many patterns can be implemented in a few lines of code.</text><text x="84" y="606" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">If you do use a framework, ensure you understand the underlying code.</text><text x="84" y="624" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">Incorrect assumptions about what&apos;s under the hood are a common source of customer error.</text></g><g id="footer"><text x="1220" y="700" fill="#6B7280" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="end">03</text></g></svg>