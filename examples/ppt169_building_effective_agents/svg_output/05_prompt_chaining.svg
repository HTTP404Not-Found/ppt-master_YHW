<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><filter id="cardShadow" width="140%" height="140%" x="-15%" y="-15%"><feGaussianBlur in="SourceAlpha" stdDeviation="10"/><feOffset dx="0" dy="4" result="offsetBlur"/><feFlood flood-color="#000" flood-opacity=".12" result="shadowColor"/><feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1280" height="720" fill="#0F1117"/><g id="header"><rect width="4" height="32" x="60" y="40" fill="#5B9BD5" rx="2"/><text x="78" y="66" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="bold">Workflow: Prompt Chaining</text></g><g id="diagram"><image width="1120" height="300" x="80" y="88" href="../images/image_1.png" preserveAspectRatio="xMidYMid meet"/></g><g id="when-to-use"><rect width="560" height="260" x="60" y="400" fill="#1A1D27" stroke="#2D3348" stroke-width="1" filter="url(#cardShadow)" rx="12"/><use width="24" height="24" x="84" y="422" fill="#5B9BD5" data-icon="chunk/target"/><text x="118" y="442" fill="#5B9BD5" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="bold">When to Use</text><text x="84" y="478" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">Tasks cleanly decomposed into</text><text x="84" y="500" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">fixed subtasks.</text><rect width="512" height="1" x="84" y="518" fill="#2D3348" fill-opacity=".4"/><text x="84" y="546" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">• Decompose task into sequential steps</text><text x="84" y="571" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">• Each LLM call processes previous output</text><text x="84" y="596" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">• Add programmatic &quot;gate&quot; checks</text><text x="84" y="621" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">• Trade latency for higher accuracy</text></g><g id="examples"><rect width="570" height="260" x="650" y="400" fill="#1A1D27" stroke="#2D3348" stroke-width="1" filter="url(#cardShadow)" rx="12"/><use width="24" height="24" x="674" y="422" fill="#D4845A" data-icon="chunk/code"/><text x="708" y="442" fill="#D4845A" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="bold">Examples</text><rect width="522" height="72" x="674" y="470" fill="#0F1117" stroke="#2D3348" stroke-width="1" rx="8"/><text x="694" y="496" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="bold">Marketing Copy Pipeline</text><text x="694" y="520" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">Generate copy → Translate to target language</text><rect width="522" height="80" x="674" y="558" fill="#0F1117" stroke="#2D3348" stroke-width="1" rx="8"/><text x="694" y="584" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="bold">Document Writing Pipeline</text><text x="694" y="608" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">Write outline → Check criteria → Write document</text><text x="694" y="626" fill="#6B7280" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13">Each step makes the LLM call an easier task</text></g><g id="footer"><text x="1220" y="700" fill="#6B7280" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="end">05</text></g></svg>