<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><filter id="cardShadow" width="140%" height="140%" x="-15%" y="-15%"><feGaussianBlur in="SourceAlpha" stdDeviation="10"/><feOffset dx="0" dy="4" result="offsetBlur"/><feFlood flood-color="#000" flood-opacity=".12" result="shadowColor"/><feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1280" height="720" fill="#0F1117"/><g id="header"><rect width="4" height="32" x="60" y="40" fill="#D4845A" rx="2"/><text x="78" y="66" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="bold">Agents in Practice</text><text x="78" y="92" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">Two promising applications demonstrating practical value</text></g><g id="customer-support"><rect width="550" height="248" x="60" y="115" fill="#1A1D27" stroke="#2D3348" stroke-width="1" filter="url(#cardShadow)" rx="12"/><rect width="6" height="248" x="60" y="115" fill="#5B9BD5" rx="3"/><text x="86" y="148" fill="#5B9BD5" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="bold">A. Customer Support</text><text x="86" y="180" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">Natural fit for open-ended agents:</text><use width="16" height="16" x="86" y="200" fill="#9CA3AF" data-icon="chunk/share-nodes"/><text x="112" y="214" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">Conversation flow + external information access</text><use width="16" height="16" x="86" y="226" fill="#9CA3AF" data-icon="chunk/toolbox"/><text x="112" y="240" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">Tools for customer data, orders, knowledge base</text><use width="16" height="16" x="86" y="252" fill="#9CA3AF" data-icon="chunk/code"/><text x="112" y="266" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">Programmatic actions (refunds, ticket updates)</text><use width="16" height="16" x="86" y="278" fill="#9CA3AF" data-icon="chunk/checkmark"/><text x="112" y="292" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">Measurable success via user-defined resolutions</text><rect width="500" height="1" x="86" y="310" fill="#2D3348" fill-opacity=".4"/><text x="86" y="337" fill="#E8B87D" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13">Usage-based pricing — charge only for successful resolutions</text></g><g id="coding-agents"><rect width="550" height="272" x="60" y="388" fill="#1A1D27" stroke="#2D3348" stroke-width="1" filter="url(#cardShadow)" rx="12"/><rect width="6" height="272" x="60" y="388" fill="#D4845A" rx="3"/><text x="86" y="421" fill="#D4845A" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="bold">B. Coding Agents</text><text x="86" y="453" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">Remarkable potential — agents are effective because:</text><use width="16" height="16" x="86" y="473" fill="#9CA3AF" data-icon="chunk/badge-check"/><text x="112" y="487" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">Code solutions verifiable via automated tests</text><use width="16" height="16" x="86" y="499" fill="#9CA3AF" data-icon="chunk/arrows-repeat"/><text x="112" y="513" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">Iterate using test results as feedback</text><use width="16" height="16" x="86" y="525" fill="#9CA3AF" data-icon="chunk/layers"/><text x="112" y="539" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">Well-defined and structured problem space</text><use width="16" height="16" x="86" y="551" fill="#9CA3AF" data-icon="chunk/target"/><text x="112" y="565" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">Output quality measured objectively</text><rect width="500" height="1" x="86" y="583" fill="#2D3348" fill-opacity=".4"/><text x="86" y="606" fill="#E8B87D" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13">SWE-bench: solving real GitHub issues from PR descriptions alone</text><text x="86" y="628" fill="#6B7280" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13">More time optimizing tools than the overall prompt</text></g><g id="coding-flow"><image width="580" height="545" x="640" y="115" href="../images/image_7.png" preserveAspectRatio="xMidYMid meet"/></g><g id="footer"><text x="1220" y="700" fill="#6B7280" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="end">11</text></g></svg>