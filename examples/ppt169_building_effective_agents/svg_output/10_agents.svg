<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><radialGradient id="agentGlow" cx="50%" cy="40%" r="50%"><stop offset="0%" stop-color="#D4845A" stop-opacity=".08"/><stop offset="100%" stop-color="#D4845A" stop-opacity="0"/></radialGradient></defs><rect width="1280" height="720" fill="#0F1117"/><rect width="1280" height="720" fill="url(#agentGlow)"/><g id="header"><rect width="4" height="36" x="60" y="50" fill="#D4845A" rx="2"/><text x="78" y="80" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="bold">Agents: Autonomous LLM Systems</text></g><g id="diagram"><image width="880" height="367" x="200" y="110" href="../images/image_6.png" preserveAspectRatio="xMidYMid meet"/></g><g id="capabilities"><rect width="1160" height="1" x="60" y="500" fill="#2D3348" fill-opacity=".3"/><rect width="200" height="36" x="80" y="520" fill="#D4845A" fill-opacity=".12" stroke="#D4845A" stroke-opacity=".3" stroke-width="1" rx="18"/><text x="180" y="544" fill="#D4845A" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" text-anchor="middle">Complex Inputs</text><rect width="220" height="36" x="300" y="520" fill="#D4845A" fill-opacity=".12" stroke="#D4845A" stroke-opacity=".3" stroke-width="1" rx="18"/><text x="410" y="544" fill="#D4845A" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" text-anchor="middle">Reasoning &amp; Planning</text><rect width="200" height="36" x="540" y="520" fill="#D4845A" fill-opacity=".12" stroke="#D4845A" stroke-opacity=".3" stroke-width="1" rx="18"/><text x="640" y="544" fill="#D4845A" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" text-anchor="middle">Reliable Tool Use</text><rect width="200" height="36" x="760" y="520" fill="#D4845A" fill-opacity=".12" stroke="#D4845A" stroke-opacity=".3" stroke-width="1" rx="18"/><text x="860" y="544" fill="#D4845A" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" text-anchor="middle">Error Recovery</text><rect width="200" height="36" x="980" y="520" fill="#D4845A" fill-opacity=".12" stroke="#D4845A" stroke-opacity=".3" stroke-width="1" rx="18"/><text x="1080" y="544" fill="#D4845A" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" text-anchor="middle">Human Checkpoints</text></g><g id="insight"><text x="640" y="596" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" text-anchor="middle">Implementation is often straightforward: <tspan fill="#E8B87D" font-weight="bold">LLMs using tools in a loop.</tspan></text><text x="640" y="628" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" text-anchor="middle">Higher costs + compounding errors → extensive testing in sandboxed environments + guardrails.</text></g><g id="footer"><text x="1220" y="700" fill="#6B7280" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="end">10</text></g></svg>