<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><radialGradient id="bgGlow1" cx="50%" cy="40%" r="50%"><stop offset="0%" stop-color="#D4845A" stop-opacity=".08"/><stop offset="100%" stop-color="#D4845A" stop-opacity="0"/></radialGradient><linearGradient id="numberGrad" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" stop-color="#D4845A"/><stop offset="100%" stop-color="#E8B87D"/></linearGradient><filter id="cardShadow" width="140%" height="140%" x="-15%" y="-15%"><feGaussianBlur in="SourceAlpha" stdDeviation="10"/><feOffset dx="0" dy="4" result="offsetBlur"/><feFlood flood-color="#000" flood-opacity=".12" result="shadowColor"/><feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1280" height="720" fill="#0F1117"/><rect width="1280" height="720" fill="url(#bgGlow1)"/><circle cx="180" cy="600" r="70" fill="none" stroke="#D4845A" stroke-opacity=".06" stroke-width="1"/><circle cx="1100" cy="140" r="90" fill="none" stroke="#5B9BD5" stroke-opacity=".05" stroke-width="1"/><g id="header"><text x="640" y="80" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle">Three Core Principles</text><rect width="140" height="4" x="570" y="95" fill="url(#numberGrad)" rx="2"/></g><g id="principle-1"><rect width="370" height="310" x="60" y="140" fill="#1A1D27" stroke="#2D3348" stroke-width="1" filter="url(#cardShadow)" rx="14"/><circle cx="245" cy="210" r="40" fill="#D4845A" fill-opacity=".12" stroke="#D4845A" stroke-opacity=".4" stroke-width="1.5"/><text x="245" y="222" fill="#D4845A" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle">1</text><use width="48" height="48" x="221" y="268" fill="#D4845A" data-icon="chunk/star"/><text x="245" y="346" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle">Simplicity</text><text x="245" y="380" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" text-anchor="middle">Maintain simplicity in your</text><text x="245" y="400" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" text-anchor="middle">agent&apos;s design. Build the right</text><text x="245" y="420" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" text-anchor="middle">system, not the most sophisticated.</text></g><g id="principle-2"><rect width="370" height="310" x="455" y="140" fill="#1A1D27" stroke="#2D3348" stroke-width="1" filter="url(#cardShadow)" rx="14"/><circle cx="640" cy="210" r="40" fill="#5B9BD5" fill-opacity=".12" stroke="#5B9BD5" stroke-opacity=".4" stroke-width="1.5"/><text x="640" y="222" fill="#5B9BD5" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle">2</text><use width="48" height="48" x="616" y="268" fill="#5B9BD5" data-icon="chunk/eye"/><text x="640" y="346" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle">Transparency</text><text x="640" y="380" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" text-anchor="middle">Prioritize transparency by</text><text x="640" y="400" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" text-anchor="middle">explicitly showing the agent&apos;s</text><text x="640" y="420" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" text-anchor="middle">planning steps.</text></g><g id="principle-3"><rect width="370" height="310" x="850" y="140" fill="#1A1D27" stroke="#2D3348" stroke-width="1" filter="url(#cardShadow)" rx="14"/><circle cx="1035" cy="210" r="40" fill="#E8B87D" fill-opacity=".12" stroke="#E8B87D" stroke-opacity=".4" stroke-width="1.5"/><text x="1035" y="222" fill="#E8B87D" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle">3</text><use width="48" height="48" x="1011" y="268" fill="#E8B87D" data-icon="chunk/toolbox"/><text x="1035" y="346" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle">ACI Design</text><text x="1035" y="380" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" text-anchor="middle">Craft your agent-computer</text><text x="1035" y="400" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" text-anchor="middle">interface through thorough tool</text><text x="1035" y="420" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" text-anchor="middle">documentation and testing.</text></g><g id="summary"><rect width="1000" height="100" x="140" y="490" fill="#1A1D27" stroke="#D4845A" stroke-opacity=".3" stroke-width="1" rx="12"/><text x="640" y="533" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" text-anchor="middle">Start with <tspan fill="#D4845A" font-weight="bold">simple prompts</tspan> → optimize with <tspan fill="#5B9BD5" font-weight="bold">comprehensive evaluation</tspan></text><text x="640" y="562" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" text-anchor="middle">→ add agentic systems only when <tspan fill="#E8B87D" font-weight="bold">simpler solutions fall short</tspan></text></g><g id="footer"><rect width="1280" height="1" x="0" y="660" fill="#2D3348" fill-opacity=".3"/><text x="60" y="692" fill="#6B7280" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">Anthropic Engineering · Building Effective Agents</text><text x="1220" y="692" fill="#6B7280" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="end">12</text></g></svg>