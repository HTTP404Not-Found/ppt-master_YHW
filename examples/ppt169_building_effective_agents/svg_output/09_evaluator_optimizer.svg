<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><filter id="cardShadow" width="140%" height="140%" x="-15%" y="-15%"><feGaussianBlur in="SourceAlpha" stdDeviation="10"/><feOffset dx="0" dy="4" result="offsetBlur"/><feFlood flood-color="#000" flood-opacity=".12" result="shadowColor"/><feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1280" height="720" fill="#0F1117"/><g id="header"><rect width="4" height="32" x="60" y="40" fill="#5B9BD5" rx="2"/><text x="78" y="66" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="bold">Workflow: Evaluator-Optimizer</text></g><g id="diagram"><image width="1120" height="280" x="80" y="88" href="../images/image_5.png" preserveAspectRatio="xMidYMid meet"/></g><g id="mechanism"><rect width="560" height="275" x="60" y="385" fill="#1A1D27" stroke="#2D3348" stroke-width="1" filter="url(#cardShadow)" rx="12"/><use width="24" height="24" x="84" y="410" fill="#5B9BD5" data-icon="chunk/arrows-repeat"/><text x="118" y="430" fill="#5B9BD5" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="bold">Mechanism</text><text x="84" y="466" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">One LLM generates a response,</text><text x="84" y="488" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">another evaluates in a feedback loop.</text><rect width="512" height="1" x="84" y="510" fill="#2D3348" fill-opacity=".4"/><text x="84" y="540" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="bold">Two signs of good fit:</text><text x="100" y="568" fill="#4ADE80" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">①</text><text x="120" y="568" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">Human feedback demonstrably</text><text x="120" y="586" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">improves LLM responses</text><text x="100" y="616" fill="#4ADE80" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">②</text><text x="120" y="616" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">The LLM itself can provide</text><text x="120" y="634" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14">such feedback reliably</text></g><g id="examples"><rect width="570" height="275" x="650" y="385" fill="#1A1D27" stroke="#2D3348" stroke-width="1" filter="url(#cardShadow)" rx="12"/><use width="24" height="24" x="674" y="410" fill="#D4845A" data-icon="chunk/eye"/><text x="708" y="430" fill="#D4845A" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="bold">Examples</text><text x="674" y="466" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">Clear evaluation criteria and</text><text x="674" y="488" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">measurable iterative refinement.</text><rect width="522" height="1" x="674" y="510" fill="#2D3348" fill-opacity=".4"/><rect width="522" height="68" x="674" y="530" fill="#0F1117" stroke="#2D3348" stroke-width="1" rx="8"/><use width="20" height="20" x="690" y="548" fill="#D4845A" data-icon="chunk/book-open"/><text x="720" y="558" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="bold">Literary Translation</text><text x="720" y="580" fill="#9CA3AF" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13">Evaluator catches nuances the translator missed</text><rect width="522" height="42" x="674" y="612" fill="#0F1117" stroke="#2D3348" stroke-width="1" rx="8"/><use width="20" height="20" x="690" y="622" fill="#D4845A" data-icon="chunk/target"/><text x="720" y="640" fill="#E8E8EC" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="bold">Complex Multi-round Search</text></g><g id="footer"><text x="1220" y="700" fill="#6B7280" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="end">09</text></g></svg>