<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><filter id="cardShadow05" width="140%" height="140%" x="-15%" y="-15%"><feGaussianBlur in="SourceAlpha" stdDeviation="10"/><feOffset dx="0" dy="5" result="offsetBlur"/><feFlood flood-color="#000" flood-opacity=".18" result="shadowColor"/><feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter><clipPath id="mainImgClip05"><rect width="530" height="380" x="700" y="90" rx="14"/></clipPath><clipPath id="accentImgClip05"><rect width="250" height="170" x="700" y="490" rx="10"/></clipPath></defs><rect width="1280" height="720" fill="#1A1714"/><g id="p05-header"><use width="28" height="28" x="60" y="30" fill="#D4956A" data-icon="tabler-filled/diamond"/><text x="98" y="52" fill="#8B7355" font-family="Georgia, SimSun, serif" font-size="14" letter-spacing="3">三大底层元素 · 贰</text></g><g id="p05-title"><text x="60" y="130" fill="#E8E0D4" font-family="Georgia, SimSun, serif" font-size="36" font-weight="bold">材质</text><text x="60" y="172" fill="#C4A882" font-family="Georgia, SimSun, serif" font-size="26">触手可及的空间语言</text></g><rect width="40" height="2" x="60" y="192" fill="#3D362E"/><g id="p05-points"><g id="p05-card1"><rect width="600" height="72" x="60" y="218" fill="#2A2520" filter="url(#cardShadow05)" rx="10"/><rect width="4" height="72" x="60" y="218" fill="#C4A882" rx="2"/><use width="28" height="28" x="80" y="236" fill="#C4A882" data-icon="tabler-filled/sun"/><text x="120" y="248" fill="#E8E0D4" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold">物理基础</text><text x="120" y="274" fill="#B0A08E" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15">材料决定空间的色彩呈现、光照效果与质感表现</text></g><g id="p05-card2"><rect width="600" height="72" x="60" y="308" fill="#2A2520" filter="url(#cardShadow05)" rx="10"/><rect width="4" height="72" x="60" y="308" fill="#D4956A" rx="2"/><text x="80" y="340" fill="#E8E0D4" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold">材质语言</text><text x="80" y="366" fill="#B0A08E" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15">原木 → 质朴温暖 ｜ 手工编织 → 慵懒松弛</text></g><g id="p05-card3"><rect width="600" height="72" x="60" y="398" fill="#2A2520" filter="url(#cardShadow05)" rx="10"/><rect width="4" height="72" x="60" y="398" fill="#8B7355" rx="2"/><text x="80" y="430" fill="#E8E0D4" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold">光 = 一种材质</text><text x="80" y="456" fill="#B0A08E" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15">不同材质在光线照射下呈现截然不同的质感</text></g><g id="p05-card4"><rect width="600" height="72" x="60" y="488" fill="#2A2520" filter="url(#cardShadow05)" rx="10"/><rect width="4" height="72" x="60" y="488" fill="#7BA37B" rx="2"/><text x="80" y="520" fill="#E8E0D4" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold">不依赖昂贵</text><text x="80" y="546" fill="#B0A08E" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15">巧妙照明 + 色彩光影搭配 → 赋予空间高级感</text></g></g><g id="p05-main-image"><image width="530" height="380" x="700" y="90" clip-path="url(#mainImgClip05)" href="../images/material_detail.png" preserveAspectRatio="xMidYMid slice"/></g><g id="p05-accent-image"><image width="250" height="170" x="700" y="490" clip-path="url(#accentImgClip05)" href="../images/light_material.png" preserveAspectRatio="xMidYMid slice"/><text x="710" y="675" fill="#7A6E60" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12">光影下的材质质感</text></g><text x="980" y="580" fill="#8B7355" font-family="Georgia, SimSun, serif" font-size="16" font-style="italic">&quot;粗糙变得温柔，</text><text x="980" y="604" fill="#8B7355" font-family="Georgia, SimSun, serif" font-size="16" font-style="italic">平滑折射出深度&quot;</text><text x="1210" y="690" fill="#7A6E60" font-family="Georgia, SimSun, serif" font-size="12" text-anchor="end">05 / 12</text></svg>