松 / 兴奋 · 传统 / 现代</text></g><g id="p07-case-images"><image width="280" height="155" x="650" y="375" href="../images/cmt_neutral_mix.png" preserveAspectRatio="xMidYMid slice"/><rect width="280" height="155" x="650" y="375" fill="#1A1714" fill-opacity=".15"/><text x="660" y="520" fill="#7A6E60" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12">中性色 + 多材质层次</text><image width="280" height="155" x="950" y="375" href="../images/dark_tone_luxury.png" preserveAspectRatio="xMidYMid slice"/><rect width="280" height="155" x="950" y="375" fill="#1A1714" fill-opacity=".15"/><text x="960" y="520" fill="#7A6E60" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12">深色调 + 镜面材质对比</text></g><g id="p07-quote"><rect width="580" height="80" x="650" y="555" fill="#2A2520" rx="10"/><rect width="580" height="3" x="650" y="555" fill="url(#accentGrad07)" rx="1"/><text x="670" y="585" fill="#C4A882" font-family="Georgia, SimSun, serif" font-size="17" font-style="italic">&quot;CMT 不是三者的简单叠加，</text><text x="670" y="612" fill="#C4A882" font-family="Georgia, SimSun, serif" font-size="17" font-style="italic">而是一位指挥家，让色彩、材质、纹理在空间中和谐共鸣&quot;</text></g><text x="1210" y="690" fill="#7A6E60" font-family="Georgia, SimSun, serif" font-size="12" text-anchor="end">07 / 12</text></svg>