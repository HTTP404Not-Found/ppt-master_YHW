<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><linearGradient id="imgOverlay02" x1="1" x2="0" y1="0" y2="0"><stop offset="0%" stop-color="#1A1714" stop-opacity=".1"/><stop offset="40%" stop-color="#1A1714" stop-opacity=".7"/><stop offset="100%" stop-color="#1A1714" stop-opacity=".95"/></linearGradient><linearGradient id="accentLine02" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#C4A882"/><stop offset="100%" stop-color="#D4956A"/></linearGradient></defs><rect width="1280" height="720" fill="#1A1714"/><image width="800" height="720" x="480" y="0" href="../images/space_overview.png" preserveAspectRatio="xMidYMid slice"/><rect width="800" height="720" x="480" y="0" fill="url(#imgOverlay02)"/><rect width="3" height="100" x="80" y="180" fill="url(#accentLine02)" rx="1.5"/><text x="80" y="170" fill="#8B7355" font-family="Georgia, SimSun, serif" font-size="14" letter-spacing="4">CHAPTER 01</text><g id="p02-title"><text x="100" y="240" fill="#E8E0D4" font-family="Georgia, SimSun, serif" font-size="38" font-weight="bold">从&quot;网红风&quot;</text><text x="100" y="290" fill="#C4A882" font-family="Georgia, SimSun, serif" font-size="38" font-weight="bold">到&quot;人的尺度&quot;</text></g><rect width="60" height="2" x="100" y="315" fill="#3D362E"/><g id="p02-content"><text x="100" y="360" fill="#E8E0D4" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20">过去几年，我们见惯了各种家居&quot;网红风&quot;的迅速更迭。</text><text x="100" y="410" fill="#B0A08E" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20">到了 2026 年，家居设计正悄然发生一场深刻的转变——</text><text x="100" y="450" fill="#B0A08E" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20">从视觉符号的堆砌，回归到对人本身的关怀。</text></g><rect width="4" height="60" x="100" y="490" fill="#D4956A" rx="2"/><text x="120" y="515" fill="#C4A882" font-family="Georgia, SimSun, serif" font-size="22" font-style="italic">&quot;高级感的空间，是色彩、材质、纹理</text><text x="120" y="545" fill="#C4A882" font-family="Georgia, SimSun, serif" font-size="22" font-style="italic">的精妙搭配所营造出来的。&quot;</text><text x="100" y="620" fill="#7A6E60" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16">有颜值，更有温度与情感</text><text x="1210" y="690" fill="#7A6E60" font-family="Georgia, SimSun, serif" font-size="12" text-anchor="end">02 / 12</text></svg>