<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><filter id="cardShadow03" width="140%" height="140%" x="-15%" y="-15%"><feGaussianBlur in="SourceAlpha" stdDeviation="10"/><feOffset dx="0" dy="5" result="offsetBlur"/><feFlood flood-color="#000" flood-opacity=".18" result="shadowColor"/><feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter><linearGradient id="accentBar03" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#C4A882"/><stop offset="100%" stop-color="#D4956A"/></linearGradient><clipPath id="colorWheelClip"><rect width="420" height="540" x="60" y="110" rx="16"/></clipPath></defs><rect width="1280" height="720" fill="#1A1714"/><g id="p03-header"><use width="32" height="32" x="60" y="30" fill="#D4956A" data-icon="tabler-filled/palette"/><text x="102" y="56" fill="#8B7355" font-family="Georgia, SimSun, serif" font-size="14" letter-spacing="3">三大底层元素 · 壹</text><rect width="50" height="3" x="60" y="75" fill="url(#accentBar03)" rx="1.5"/></g><g id="p03-image"><image width="420" height="540" x="60" y="110" clip-path="url(#colorWheelClip)" href="../images/color_wheel.png" preserveAspectRatio="xMidYMid slice"/></g><g id="p03-title"><text x="520" y="155" fill="#E8E0D4" font-family="Georgia, SimSun, serif" font-size="36" font-weight="bold">色彩</text><text x="520" y="200" fill="#C4A882" font-family="Georgia, SimSun, serif" font-size="26">空间的&quot;情绪魔法师&quot;</text></g><rect width="40" height="2" x="520" y="220" fill="#3D362E"/><g id="p03-points"><g id="p03-point1"><rect width="700" height="80" x="520" y="248" fill="#2A2520" filter="url(#cardShadow03)" rx="10"/><rect width="4" height="80" x="520" y="248" fill="#C4A882" rx="2"/><text x="544" y="278" fill="#E8E0D4" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="bold">第一印象</text><text x="544" y="308" fill="#B0A08E" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16">色彩是空间给人的第一印象和最直观的感受</text></g><g id="p03-point2"><rect width="700" height="80" x="520" y="345" fill="#2A2520" filter="url(#cardShadow03)" rx="10"/><rect width="4" height="80" x="520" y="345" fill="#D4956A" rx="2"/><text x="544" y="375" fill="#E8E0D4" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="bold">改变视觉尺度</text><text x="544" y="405" fill="#B0A08E" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16">暖色调 → 温柔包裹感 ｜ 冷色调 → 开阔冷静</text></g><g id="p03-point3"><rect width="700" height="80" x="520" y="442" fill="#2A2520" filter="url(#cardShadow03)" rx="10"/><rect width="4" height="80" x="520" y="442" fill="#8B7355" rx="2"/><text x="544" y="472" fill="#E8E0D4" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="bold">心理反应</text><text x="544" y="502" fill="#B0A08E" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16">灰绿 → 平静专注 ｜ 咖色 → 阳光包裹 ｜ 跳色 → 个性活力</text></g></g><image width="300" height="120" x="920" y="545" href="../images/brown_cozy.png" preserveAspectRatio="xMidYMid slice"/><rect width="300" height="120" x="920" y="545" fill="#1A1714" fill-opacity=".25"/><text x="935" y="652" fill="#7A6E60" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12">混色调棕色营造宁静与质朴</text><text x="1210" y="690" fill="#7A6E60" font-family="Georgia, SimSun, serif" font-size="12" text-anchor="end">03 / 12</text></svg>