<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><filter id="cardShadow06" width="140%" height="140%" x="-15%" y="-15%"><feGaussianBlur in="SourceAlpha" stdDeviation="10"/><feOffset dx="0" dy="5" result="offsetBlur"/><feFlood flood-color="#000" flood-opacity=".18" result="shadowColor"/><feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter><clipPath id="leftImgClip06"><rect width="540" height="310" x="60" y="190" rx="12"/></clipPath><clipPath id="rightImgClip06"><rect width="580" height="310" x="640" y="190" rx="12"/></clipPath></defs><rect width="1280" height="720" fill="#1A1714"/><g id="p06-header"><use width="28" height="28" x="60" y="30" fill="#D4956A" data-icon="tabler-filled/paint"/><text x="98" y="52" fill="#8B7355" font-family="Georgia, SimSun, serif" font-size="14" letter-spacing="3">三大底层元素 · 叁</text></g><g id="p06-title"><text x="60" y="120" fill="#E8E0D4" font-family="Georgia, SimSun, serif" font-size="36" font-weight="bold">纹理：赋予空间灵魂的细节</text><text x="60" y="155" fill="#B0A08E" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18">纹理，就像是空间的&quot;指纹&quot;——赋予独一无二的辨识度</text></g><g id="p06-left-image" filter="url(#cardShadow06)"><image width="540" height="310" x="60" y="190" clip-path="url(#leftImgClip06)" href="../images/texture_tactile.png" preserveAspectRatio="xMidYMid slice"/><rect width="540" height="60" x="60" y="440" fill="#1A1714" fill-opacity=".75" rx="0"/><use width="24" height="24" x="80" y="455" fill="#C4A882" data-icon="tabler-filled/eye"/><text x="114" y="475" fill="#E8E0D4" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold">触觉纹理</text><text x="240" y="475" fill="#B0A08E" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14">手指、脚或身体直接感知的表面特征</text></g><g id="p06-right-image" filter="url(#cardShadow06)"><image width="580" height="310" x="640" y="190" clip-path="url(#rightImgClip06)" href="../images/texture_visual.png" preserveAspectRatio="xMidYMid slice"/><rect width="580" height="60" x="640" y="440" fill="#1A1714" fill-opacity=".75" rx="0"/><use width="24" height="24" x="660" y="455" fill="#D4956A" data-icon="tabler-filled/eye"/><text x="694" y="475" fill="#E8E0D4" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold">视觉纹理</text><text x="820" y="475" fill="#B0A08E" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14">由视觉引发的想象与感受</text></g><g id="p06-examples"><rect width="560" height="110" x="60" y="530" fill="#2A2520" rx="10"/><rect width="4" height="110" x="60" y="530" fill="#C4A882" rx="2"/><text x="84" y="560" fill="#C4A882" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="17" font-weight="bold">触觉感知</text><text x="84" y="590" fill="#B0A08E" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15">赤脚踩在羊毛地毯上 → 柔软温暖</text><text x="84" y="618" fill="#B0A08E" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15">手指轻抚粗陶花瓶 → 凹凸不平的肌理</text><rect width="560" height="110" x="660" y="530" fill="#2A2520" rx="10"/><rect width="4" height="110" x="660" y="530" fill="#D4956A" rx="2"/><text x="684" y="560" fill="#D4956A" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="17" font-weight="bold">视觉感知</text><text x="684" y="590" fill="#B0A08E" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15">细腻图案的壁纸 → 眼睛&quot;感受&quot;到肌理</text><text x="684" y="618" fill="#B0A08E" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15">没有触摸，视觉已传递了质感信号</text></g><text x="1210" y="690" fill="#7A6E60" font-family="Georgia, SimSun, serif" font-size="12" text-anchor="end">06 / 12</text></svg>