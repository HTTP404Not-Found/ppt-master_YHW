<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><linearGradient id="titleGrad" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" stop-color="#C9A96E"/><stop offset="100%" stop-color="#E8D5B7"/></linearGradient><filter id="cardShadow"><feGaussianBlur in="SourceAlpha" stdDeviation="4"/><feOffset dx="0" dy="2"/><feComponentTransfer><feFuncA slope=".25" type="linear"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter><radialGradient id="bgGlow" cx="30%" cy="30%" r="50%"><stop offset="0%" stop-color="#C9A96E" stop-opacity=".03"/><stop offset="100%" stop-color="#C9A96E" stop-opacity="0"/></radialGradient></defs><rect width="1280" height="720" fill="#1A1A2E"/><rect width="1280" height="720" fill="url(#bgGlow)"/><text x="60" y="42" fill="#C9A96E" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="12" letter-spacing="3"><tspan>PART 01 · 建筑师林徽因</tspan></text><rect width="4" height="32" x="60" y="55" fill="#C9A96E"/><text x="80" y="82" fill="#E8E8E8" font-family="'KaiTi', Georgia, serif" font-size="32" font-weight="bold"><tspan>归国初期的建筑实践</tspan></text><rect width="370" height="530" x="60" y="130" fill="#16213E" stroke="#2A2A4A" stroke-width="1" filter="url(#cardShadow)" rx="12"/><rect width="370" height="4" x="60" y="130" fill="#C9A96E" rx="2"/><rect width="60" height="24" x="80" y="152" fill="#C9A96E" fill-opacity=".15" rx="12"/><text x="110" y="169" fill="#C9A96E" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle"><tspan>1929</tspan></text><use width="36" height="36" x="80" y="195" fill="#C9A96E" data-icon="chunk/building"/><text x="80" y="260" fill="#E8D5B7" font-family="'KaiTi', Georgia, serif" font-size="22" font-weight="bold"><tspan>梁启超墓碑</tspan></text><text x="80" y="290" fill="#E8E8E8" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="16"><tspan>学成归来后的</tspan></text><text x="80" y="312" fill="#E8E8E8" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="16"><tspan>第一个作品</tspan></text><rect width="40" height="1" x="80" y="328" fill="#C9A96E" fill-opacity=".3"/><text x="80" y="355" fill="#A0A0B0" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14"><tspan>梁思成和林徽因为父亲</tspan></text><text x="80" y="377" fill="#A0A0B0" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14"><tspan>设计墓碑。大理石制成，</tspan></text><text x="80" y="399" fill="#A0A0B0" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14"><tspan>高2.8米，宽1.7米，</tspan></text><text x="80" y="421" fill="#A0A0B0" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14"><tspan>形状似榫，古朴庄重。</tspan></text><rect width="370" height="530" x="455" y="130" fill="#16213E" stroke="#2A2A4A" stroke-width="1" filter="url(#cardShadow)" rx="12"/><rect width="370" height="4" x="455" y="130" fill="#C9A96E" rx="2"/><rect width="60" height="24" x="475" y="152" fill="#C9A96E" fill-opacity=".15" rx="12"/><text x="505" y="169" fill="#C9A96E" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle"><tspan>1929</tspan></text><use width="36" height="36" x="475" y="195" fill="#C9A96E" data-icon="chunk/castle"/><text x="475" y="260" fill="#E8D5B7" font-family="'KaiTi', Georgia, serif" font-size="22" font-weight="bold"><tspan>吉林大学石头楼</tspan></text><text x="475" y="290" fill="#E8E8E8" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="16"><tspan>&quot;梁陈童蔡&quot;事务所</tspan></text><text x="475" y="312" fill="#E8E8E8" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="16"><tspan>联合设计</tspan></text><rect width="40" height="1" x="475" y="328" fill="#C9A96E" fill-opacity=".3"/><text x="475" y="355" fill="#A0A0B0" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14"><tspan>在东北大学期间，参与</tspan></text><text x="475" y="377" fill="#A0A0B0" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14"><tspan>吉林大学校舍总体规划</tspan></text><text x="475" y="399" fill="#A0A0B0" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14"><tspan>及教学楼设计，后归属</tspan></text><text x="475" y="421" fill="#A0A0B0" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14"><tspan>东北电力大学。</tspan></text><rect width="370" height="530" x="850" y="130" fill="#16213E" stroke="#2A2A4A" stroke-width="1" filter="url(#cardShadow)" rx="12"/><rect width="370" height="4" x="850" y="130" fill="#E8D5B7" rx="2"/><rect width="60" height="24" x="870" y="152" fill="#E8D5B7" fill-opacity=".15" rx="12"/><text x="900" y="169" fill="#E8D5B7" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle"><tspan>1928</tspan></text><use width="36" height="36" x="870" y="195" fill="#E8D5B7" data-icon="chunk/building"/><text x="870" y="260" fill="#E8D5B7" font-family="'KaiTi', Georgia, serif" font-size="22" font-weight="bold"><tspan>吉海铁路总站</tspan></text><text x="870" y="290" fill="#E8E8E8" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="16"><tspan>林徽因设计总体风貌</tspan></text><text x="870" y="312" fill="#E8E8E8" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="16"><tspan>梁思成负责审定</tspan></text><rect width="40" height="1" x="870" y="328" fill="#E8D5B7" fill-opacity=".3"/><text x="870" y="355" fill="#A0A0B0" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14"><tspan>大型哥特式建筑，从空中</tspan></text><text x="870" y="377" fill="#A0A0B0" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14"><tspan>俯瞰造型如雄狮伏卧，</tspan></text><text x="870" y="399" fill="#A0A0B0" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14"><tspan>&quot;狮尾&quot;巧妙设计成钟塔，</tspan></text><text x="870" y="421" fill="#A0A0B0" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14"><tspan>寓意中国如雄狮初醒。</tspan></text><rect width="330" height="180" x="870" y="440" fill="#1A1A2E" rx="8"/><image width="330" height="180" x="870" y="440" href="../images/jihai_station_old.png" preserveAspectRatio="xMidYMid slice"/><text x="1035" y="640" fill="#6B6B80" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="11" text-anchor="middle"><tspan>吉海铁路总站历史照片</tspan></text><text x="1200" y="700" fill="#6B6B80" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="12" text-anchor="end"><tspan>03 / 10</tspan></text></svg>