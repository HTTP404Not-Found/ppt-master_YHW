<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><g id="bg"><rect width="1280" height="720" fill="#FFF"/></g><g id="page-header"><text x="64" y="60" fill="#999" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="11" letter-spacing="2">P · 02</text></g><g id="quote-mark"><text x="120" y="280" fill="#D9251D" font-family="&quot;Arial Black&quot;, &quot;Microsoft YaHei&quot;, sans-serif" font-size="240" font-weight="900" opacity=".92">«</text></g><g id="quote-body"><text x="320" y="240" fill="#1A1A1A" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="32"><tspan x="320" dy="0">The grid system is an aid,</tspan> <tspan x="320" dy="46">not a guarantee.</tspan></text><text x="320" y="370" fill="#666" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="22"><tspan x="320" dy="0">It permits a number of possible uses, and each</tspan> <tspan x="320" dy="30">designer can look for a solution appropriate to</tspan> <tspan x="320" dy="30">his personal style. But one must learn how to</tspan> <tspan x="320" dy="30">use the grid — it is an art that requires practice.</tspan></text></g><g id="quote-attribution"><line x1="320" x2="380" y1="540" y2="540" stroke="#1A1A1A" stroke-width="2"/><text x="320" y="572" fill="#1A1A1A" font-family="&quot;Arial Black&quot;, &quot;Microsoft YaHei&quot;, sans-serif" font-size="18" font-weight="900">JOSEF MÜLLER-BROCKMANN</text><text x="320" y="596" fill="#666" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="14">Grid Systems in Graphic Design · 1981</text></g><g id="page-footer"><text x="1216" y="688" fill="#999" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="11" letter-spacing="1" text-anchor="end">02 / 14</text></g></svg>