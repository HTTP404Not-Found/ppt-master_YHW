<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><linearGradient id="limRail" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#1B3A5C"/><stop offset="100%" stop-color="#3E7CB1"/></linearGradient></defs><g id="bg"><rect width="1280" height="720" fill="#FFF"/></g><g id="header"><rect width="6" height="56" x="64" y="56" fill="#E8743B" rx="3"/><text x="86" y="90" fill="#1B3A5C" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="32" font-weight="800">为什么现有高效适配方法不够好</text><text x="88" y="120" fill="#8A94A1" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1">LIMITS OF EXISTING EFFICIENT-ADAPTATION METHODS</text></g><g id="rail-decor"><line x1="120" x2="120" y1="222" y2="610" stroke="url(#limRail)" stroke-linecap="round" stroke-width="3"/></g><g id="lim-01"><circle cx="120" cy="232" r="24" fill="#1B3A5C"/><text x="120" y="239" fill="#FFF" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" font-weight="800" text-anchor="middle">01</text><rect width="1026" height="128" x="190" y="170" fill="#FFF" stroke="#D8DEE6" stroke-width="1" rx="12"/><rect width="6" height="128" x="190" y="170" fill="#1B3A5C" rx="3"/><rect width="52" height="52" x="222" y="198" fill="#F4F7FA" rx="12"/><use width="28" height="28" x="234" y="210" fill="#1B3A5C" stroke-width="2" data-icon="tabler-outline/alert-triangle"/><text x="300" y="216" fill="#1D2733" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" font-weight="800">Adapter 层 → 引入<tspan fill="#C62828">推理延迟</tspan></text><text x="300" y="248" fill="#5B6776" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16">在自注意力/MLP 后插入额外层,加深模型;在线、短序列、小 batch 场景下</text><text x="300" y="274" fill="#5B6776" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16">延迟增加尤为明显(后续 Table 1 量化)。</text></g><g id="lim-02"><circle cx="120" cy="392" r="24" fill="#1B3A5C"/><text x="120" y="399" fill="#FFF" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" font-weight="800" text-anchor="middle">02</text><rect width="1026" height="128" x="190" y="330" fill="#FFF" stroke="#D8DEE6" stroke-width="1" rx="12"/><rect width="6" height="128" x="190" y="330" fill="#3E7CB1" rx="3"/><rect width="52" height="52" x="222" y="358" fill="#F4F7FA" rx="12"/><use width="28" height="28" x="234" y="370" fill="#3E7CB1" stroke-width="2" data-icon="tabler-outline/alert-triangle"/><text x="300" y="376" fill="#1D2733" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" font-weight="800">Prefix / Prompt tuning → <tspan fill="#C62828">占用输入长度</tspan></text><text x="300" y="408" fill="#5B6776" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16">用可训练的前缀 token 适配任务,会挤占可用序列长度;且前缀位置/数量</text><text x="300" y="434" fill="#5B6776" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16">敏感,优化较难。</text></g><g id="lim-03"><circle cx="120" cy="552" r="24" fill="#1B3A5C"/><text x="120" y="559" fill="#FFF" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" font-weight="800" text-anchor="middle">03</text><rect width="1026" height="128" x="190" y="490" fill="#FFF" stroke="#D8DEE6" stroke-width="1" rx="12"/><rect width="6" height="128" x="190" y="490" fill="#E8743B" rx="3"/><rect width="52" height="52" x="222" y="518" fill="#FBF0E9" rx="12"/><use width="28" height="28" x="234" y="530" fill="#E8743B" stroke-width="2" data-icon="tabler-outline/alert-triangle"/><text x="300" y="536" fill="#1D2733" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" font-weight="800">普遍 → <tspan fill="#C62828">达不到全量微调基线</tspan></text><text x="300" y="568" fill="#5B6776" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16">多数高效方法在质量上落后于 full fine-tuning,迫使人在&quot;效率&quot;与&quot;质量&quot;</text><text x="300" y="594" fill="#5B6776" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16">之间二选一 —— 这正是 LoRA 想打破的权衡。</text></g><g id="footer"><text x="64" y="700" fill="#8A94A1" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="11">来源:LoRA §1–3 · Hu et al. 2021</text><text x="1216" y="700" fill="#8A94A1" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="11" text-anchor="end">04 / 15</text></g></svg>