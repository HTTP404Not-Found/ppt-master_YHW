<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><linearGradient id="costFade" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#FFF" stop-opacity="1"/><stop offset="100%" stop-color="#FFF" stop-opacity="0"/></linearGradient></defs><g id="bg"><rect width="1280" height="720" fill="#FFF"/><image id="_edit_4" width="640" height="720" x="640" y="0" href="../images/cost_explosion.png" preserveAspectRatio="xMidYMid slice"/><rect width="220" height="720" x="620" y="0" fill="url(#costFade)"/></g><g id="header"><rect width="6" height="56" x="64" y="60" fill="#E8743B" rx="3"/><text x="86" y="92" fill="#1B3A5C" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="32" font-weight="800">模型越大,全量微调越不可行</text><text x="88" y="122" fill="#8A94A1" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1">THE COST OF FULL FINE-TUNING</text></g><g id="hero-number"><text x="64" y="320" fill="#E8743B" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="88" font-weight="800">175B</text><text x="68" y="362" fill="#1B3A5C" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="22" font-weight="700">每个下游任务都要存一份满参数副本</text></g><g id="points"><rect width="36" height="3" x="64" y="408" fill="#D8DEE6"/><text x="64" y="452" fill="#1D2733" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18">全量 fine-tuning 会更新<tspan fill="#1B3A5C" font-weight="800">全部参数</tspan>,新模型与原模型一样大</text><text x="64" y="492" fill="#1D2733" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18">部署 N 个任务 = <tspan fill="#C62828" font-weight="800">N × 175B</tspan>,存储与切换成本极高</text><text x="64" y="532" fill="#1D2733" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18">以 GPT-3 175B 为例,已从&quot;不便&quot;升级为<tspan fill="#1B3A5C" font-weight="800">部署难题</tspan></text></g><g id="footer"><text x="64" y="700" fill="#8A94A1" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="11">来源:LoRA §1 Introduction · Hu et al. 2021</text><text x="1216" y="700" fill="#8A94A1" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="11" text-anchor="end">03 / 15</text></g></svg>