<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><clipPath id="attnClip"><rect width="430" height="470" x="64" y="150" rx="14"/></clipPath></defs><g id="bg"><rect width="1280" height="720" fill="#FFF"/></g><g id="header"><rect width="6" height="56" x="64" y="56" fill="#E8743B" rx="3"/><text x="86" y="90" fill="#1B3A5C" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="32" font-weight="800">只适配注意力权重</text><text x="88" y="120" fill="#8A94A1" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1">APPLYING LoRA TO THE TRANSFORMER</text></g><g id="figure"><rect width="430" height="470" x="64" y="150" fill="#F4F7FA" rx="14"/><image id="_edit_7" width="430" height="470" x="64" y="150" clip-path="url(#attnClip)" href="../images/attention_apply.png" preserveAspectRatio="xMidYMid meet"/><rect width="430" height="470" x="64" y="150" fill="none" stroke="#D8DEE6" stroke-width="1.5" rx="14"/><text x="64" y="644" fill="#8A94A1" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="13">自注意力的 Wq、Wv 各挂一条 LoRA 旁路,MLP 冻结</text></g><g id="point-scope"><use width="34" height="34" x="540" y="166" fill="#1B3A5C" stroke-width="2" data-icon="tabler-outline/sitemap"/><text x="586" y="192" fill="#1D2733" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" font-weight="800">范围:四个投影,只动两个</text><text x="540" y="232" fill="#1D2733" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17">自注意力含 <tspan fill="#1B3A5C" font-weight="800">Wq / Wk / Wv / Wo</tspan></text><text x="540" y="262" fill="#1D2733" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17">实验中只适配 <tspan fill="#E8743B" font-weight="800">Wq、Wv</tspan>,冻结 MLP(为简洁与参数效率)</text></g><g id="card-param"><rect width="676" height="150" x="540" y="300" fill="#F4F7FA" stroke="#D8DEE6" stroke-width="1" rx="14"/><text x="566" y="338" fill="#1B3A5C" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" font-weight="800">可训练参数量</text><image width="520" height="52" x="566" y="356" href="../images/formula_004.png" preserveAspectRatio="xMidYMid meet"/><text x="566" y="432" fill="#8A94A1" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14">L_LoRA = 应用 LoRA 的权重矩阵数;只随 r 线性增长</text></g><g id="kpi-reduction"><rect width="330" height="142" x="540" y="478" fill="#FFF" stroke="#D8DEE6" stroke-width="1" rx="14"/><text x="566" y="514" fill="#5B6776" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" font-weight="700">训练显存 VRAM(GPT-3 175B)</text><text x="566" y="566" fill="#1B3A5C" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="30" font-weight="800">1.2TB <tspan fill="#8A94A1" font-size="22">→</tspan> <tspan fill="#2E7D32">350GB</tspan></text><text x="566" y="598" fill="#8A94A1" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14">约降至原来的 1/3</text><rect width="330" height="142" x="886" y="478" fill="#FFF" stroke="#D8DEE6" stroke-width="1" rx="14"/><text x="912" y="514" fill="#5B6776" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" font-weight="700">Checkpoint(r=4, 仅 Wq/Wv)</text><text x="912" y="566" fill="#1B3A5C" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="30" font-weight="800">350GB <tspan fill="#8A94A1" font-size="22">→</tspan> <tspan fill="#E8743B">35MB</tspan></text><text x="912" y="598" fill="#8A94A1" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14">约 10,000× 缩减</text></g><g id="footer"><text x="64" y="700" fill="#8A94A1" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="11">来源:LoRA §4.2 · Hu et al. 2021</text><text x="1216" y="700" fill="#8A94A1" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="11" text-anchor="end">08 / 15</text></g></svg>