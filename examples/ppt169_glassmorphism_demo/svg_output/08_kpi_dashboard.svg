<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><linearGradient id="titleGradient" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" stop-color="#5B8DEF"/><stop offset="50%" stop-color="#A26BFA"/><stop offset="100%" stop-color="#3DDDFC"/></linearGradient><linearGradient id="bgOverlay" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" stop-color="#0A0E27" stop-opacity=".62"/><stop offset="100%" stop-color="#0A0E27" stop-opacity=".74"/></linearGradient><linearGradient id="kpiGlass" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" stop-color="#1A2150" stop-opacity=".78"/><stop offset="100%" stop-color="#1A2150" stop-opacity=".42"/></linearGradient><linearGradient id="glassEdge" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" stop-color="#FFF" stop-opacity="0"/><stop offset="50%" stop-color="#FFF" stop-opacity=".35"/><stop offset="100%" stop-color="#FFF" stop-opacity="0"/></linearGradient></defs><g id="bg"><rect width="1280" height="720" fill="#0A0E27"/><image width="1280" height="720" x="0" y="0" href="../images/08_dashboard_bokeh.png" preserveAspectRatio="xMidYMid slice"/><rect width="1280" height="720" x="0" y="0" fill="url(#bgOverlay)"/></g><g id="header"><rect width="6" height="32" x="60" y="50" fill="url(#titleGradient)" rx="3"/><text x="80" y="76" fill="#E8ECFF" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="34" font-weight="900">上生产前,先把四张表盘装上</text><text x="80" y="108" fill="#A8B0D0" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="14" font-weight="600" letter-spacing="3">KPI DASHBOARD · WEEKLY ROLLUP</text><rect width="120" height="34" x="1100" y="55" fill="#1A2150" fill-opacity=".6" stroke="#3DDDFC" stroke-opacity=".5" stroke-width="1" rx="17"/><circle cx="1118" cy="72" r="4" fill="#4ADE80"/><text x="1132" y="78" fill="#E8ECFF" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="12" font-weight="700" letter-spacing="2">LIVE · W12</text></g><g id="kpi-accuracy"><rect width="560" height="240" x="80" y="160" fill="url(#kpiGlass)" stroke="#FFF" stroke-opacity=".16" stroke-width="1" rx="20"/><rect width="524" height="1" x="98" y="161" fill="url(#glassEdge)"/><rect width="6" height="60" x="98" y="184" fill="#4ADE80" rx="3"/><rect width="50" height="50" x="120" y="180" fill="#4ADE80" fill-opacity=".2" rx="12"/><use width="36" height="36" x="127" y="187" fill="#4ADE80" data-icon="phosphor-duotone/check-circle"/><text x="186" y="200" fill="#4ADE80" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="700" letter-spacing="3">ACCURACY</text><text x="186" y="228" fill="#E8ECFF" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" font-weight="800">任务成功率</text><text x="100" y="334" fill="#FFF" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="88" font-weight="900" letter-spacing="-2">92.4</text><text x="358" y="334" fill="#A8B0D0" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="38" font-weight="700">%</text><polygon fill="#4ADE80" points="430 290 446 308 414 308"/><text x="456" y="306" fill="#4ADE80" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" font-weight="800">+3.2 pp</text><text x="456" y="328" fill="#A8B0D0" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="500">vs. 上周</text><line x1="100" x2="620" y1="360" y2="360" stroke="#FFF" stroke-opacity=".12"/><text x="100" y="384" fill="#A8B0D0" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="500">12 周累计提升 21.4 pp · 接近内部 SLO 95% 阈值</text></g><g id="kpi-latency"><rect width="540" height="240" x="660" y="160" fill="url(#kpiGlass)" stroke="#FFF" stroke-opacity=".16" stroke-width="1" rx="20"/><rect width="504" height="1" x="678" y="161" fill="url(#glassEdge)"/><rect width="6" height="60" x="678" y="184" fill="#5B8DEF" rx="3"/><rect width="50" height="50" x="700" y="180" fill="#5B8DEF" fill-opacity=".2" rx="12"/><use width="36" height="36" x="707" y="187" fill="#5B8DEF" data-icon="phosphor-duotone/gauge"/><text x="766" y="200" fill="#5B8DEF" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="700" letter-spacing="3">LATENCY</text><text x="766" y="228" fill="#E8ECFF" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" font-weight="800">P95 端到端延迟</text><text x="680" y="334" fill="#FFF" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="88" font-weight="900" letter-spacing="-2">4.8</text><text x="836" y="334" fill="#A8B0D0" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="38" font-weight="700">s</text><polygon fill="#4ADE80" points="920 308 936 290 904 290"/><text x="946" y="306" fill="#4ADE80" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" font-weight="800">−18%</text><text x="946" y="328" fill="#A8B0D0" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="500">vs. 上周</text><line x1="680" x2="1180" y1="360" y2="360" stroke="#FFF" stroke-opacity=".12"/><text x="680" y="384" fill="#A8B0D0" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="500">引入并发工具调用 + 结果缓存后,P95 从 11.2s 收敛至 4.8s</text></g><g id="kpi-cost"><rect width="560" height="240" x="80" y="430" fill="url(#kpiGlass)" stroke="#FFF" stroke-opacity=".16" stroke-width="1" rx="20"/><rect width="524" height="1" x="98" y="431" fill="url(#glassEdge)"/><rect width="6" height="60" x="98" y="454" fill="#A26BFA" rx="3"/><rect width="50" height="50" x="120" y="450" fill="#A26BFA" fill-opacity=".2" rx="12"/><use width="36" height="36" x="127" y="457" fill="#A26BFA" data-icon="phosphor-duotone/coin"/><text x="186" y="470" fill="#A26BFA" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="700" letter-spacing="3">COST</text><text x="186" y="498" fill="#E8ECFF" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" font-weight="800">单次任务成本</text><text x="100" y="604" fill="#A8B0D0" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="56" font-weight="700">¥</text><text x="140" y="604" fill="#FFF" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="88" font-weight="900" letter-spacing="-2">0.42</text><polygon fill="#4ADE80" points="430 578 446 560 414 560"/><text x="456" y="576" fill="#4ADE80" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" font-weight="800">−22%</text><text x="456" y="598" fill="#A8B0D0" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="500">vs. 上周</text><line x1="100" x2="620" y1="630" y2="630" stroke="#FFF" stroke-opacity=".12"/><text x="100" y="654" fill="#A8B0D0" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="500">关键来源:模型分级路由 + 检索结果缓存复用</text></g><g id="kpi-reliability"><rect width="540" height="240" x="660" y="430" fill="url(#kpiGlass)" stroke="#FFF" stroke-opacity=".16" stroke-width="1" rx="20"/><rect width="504" height="1" x="678" y="431" fill="url(#glassEdge)"/><rect width="6" height="60" x="678" y="454" fill="#3DDDFC" rx="3"/><rect width="50" height="50" x="700" y="450" fill="#3DDDFC" fill-opacity=".2" rx="12"/><use width="36" height="36" x="707" y="457" fill="#3DDDFC" data-icon="phosphor-duotone/shield-check"/><text x="766" y="470" fill="#3DDDFC" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="700" letter-spacing="3">RELIABILITY</text><text x="766" y="498" fill="#E8ECFF" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" font-weight="800">30 天 SLO 达成率</text><text x="680" y="604" fill="#FFF" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="88" font-weight="900" letter-spacing="-2">99.7</text><text x="900" y="604" fill="#A8B0D0" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="38" font-weight="700">%</text><polygon fill="#4ADE80" points="970 578 986 560 954 560"/><text x="996" y="576" fill="#4ADE80" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" font-weight="800">+0.4 pp</text><text x="996" y="598" fill="#A8B0D0" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="500">vs. 30 日前</text><line x1="680" x2="1180" y1="630" y2="630" stroke="#FFF" stroke-opacity=".12"/><text x="680" y="654" fill="#A8B0D0" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="500">熔断 + 降级链路 + 多模型 fallback 兜住了三次上游事故</text></g><g id="footer"><text x="60" y="700" fill="#6B7299" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="600">KPI 仪表板 · 上线前必装的四块表</text><text x="1220" y="700" fill="#6B7299" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="600" text-anchor="end">08 / 12</text></g></svg>