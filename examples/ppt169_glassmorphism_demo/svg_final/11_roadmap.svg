 YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="14" font-weight="400">评估集 100+ · 自动回归 · 重试与降级机制全覆盖</text></g><g id="ms-3"><text x="172" y="450" fill="#3DDDFC" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="800" letter-spacing="1" text-anchor="end">W8 — W10</text><circle cx="200" cy="445" r="18" fill="#0A0E27" stroke="#3DDDFC" stroke-width="3"/><circle cx="200" cy="445" r="6" fill="#3DDDFC"/><path fill="url(#cardGlass)" stroke="#3DDDFC" stroke-opacity=".45" stroke-width="1" d="M254,400 H726 A14,14 0 0 1 740,414 V486 A14,14 0 0 1 726,500 H254 A14,14 0 0 1 240,486 V414 A14,14 0 0 1 254,400 Z"/><rect width="464" height="1" x="258" y="401" fill="url(#glassEdge)"/><path fill="#3DDDFC" d="M243,424 H243 A3,3 0 0 1 246,427 V473 A3,3 0 0 1 243,476 H243 A3,3 0 0 1 240,473 V427 A3,3 0 0 1 243,424 Z"/><path fill="#3DDDFC" fill-opacity=".2" d="M272,416 H298 A12,12 0 0 1 310,428 V454 A12,12 0 0 1 298,466 H272 A12,12 0 0 1 260,454 V428 A12,12 0 0 1 272,416 Z"/><g fill="#3DDDFC"><path d="M224,56V208H32V48H216A8,8,0,0,1,224,56Z" opacity=".2" transform="translate(268.0, 424.0) scale(0.1328125)"/><path d="M232,208a8,8,0,0,1-8,8H32a8,8,0,0,1-8-8V48a8,8,0,0,1,16,0V156.69l50.34-50.35a8,8,0,0,1,11.32,0L128,132.69,180.69,80H160a8,8,0,0,1,0-16h40a8,8,0,0,1,8,8v40a8,8,0,0,1-16,0V91.31l-58.34,58.35a8,8,0,0,1-11.32,0L96,123.31l-56,56V200H224A8,8,0,0,1,232,208Z" transform="translate(268.0, 424.0) scale(0.1328125)"/></g><text x="326" y="433" fill="#3DDDFC" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="700" letter-spacing="2">STAGE 03 · SCALE</text><text x="326" y="462" fill="#E8ECFF" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="22" font-weight="900">规模化 — 性能与成本</text><text x="326" y="488" fill="#A8B0D0" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="14" font-weight="400">结果缓存 · 限流熔断 · 多租户隔离 · 模型分级路由</text></g><g id="ms-4"><text x="172" y="595" fill="#4ADE80" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="800" letter-spacing="1" text-anchor="end">W11 — W12</text><circle cx="200" cy="590" r="20" fill="#0A0E27" stroke="#4ADE80" stroke-width="3"/><path fill="none" stroke="#4ADE80" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M 192 590 L 198 596 L 210 584"/><path fill="url(#cardGlass)" stroke="#4ADE80" stroke-opacity=".55" stroke-width="1.5" d="M254,545 H726 A14,14 0 0 1 740,559 V631 A14,14 0 0 1 726,645 H254 A14,14 0 0 1 240,631 V559 A14,14 0 0 1 254,545 Z"/><rect width="464" height="1" x="258" y="546" fill="url(#glassEdge)"/><path fill="#4ADE80" d="M243,569 H243 A3,3 0 0 1 246,572 V618 A3,3 0 0 1 243,621 H243 A3,3 0 0 1 240,618 V572 A3,3 0 0 1 243,569 Z"/><path fill="#4ADE80" fill-opacity=".22" d="M272,561 H298 A12,12 0 0 1 310,573 V599 A12,12 0 0 1 298,611 H272 A12,12 0 0 1 260,599 V573 A12,12 0 0 1 272,561 Z"/><use width="34" height="34" x="268" y="569" fill="#4ADE80" data-icon="phosphor-duotone/rocket"/><text x="326" y="578" fill="#4ADE80" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="700" letter-spacing="2">STAGE 04 · PRODUCTION</text><text x="326" y="607" fill="#E8ECFF" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="22" font-weight="900">生产 — 灰度与 SLO</text><text x="326" y="633" fill="#A8B0D0" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="14" font-weight="400">1% → 10% → 全量灰度 · SLO 监控 · 持续优化飞轮</text></g><g id="success-panel"><path fill="url(#cardGlass)" stroke="#FFF" stroke-opacity=".18" stroke-width="1" d="M790,150 H1200 A20,20 0 0 1 1220,170 V625 A20,20 0 0 1 1200,645 H790 A20,20 0 0 1 770,625 V170 A20,20 0 0 1 790,150 Z"/><rect width="414" height="1" x="788" y="151" fill="url(#glassEdge)"/><text x="995" y="186" fill="#3DDDFC" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="700" letter-spacing="3" text-anchor="middle">SUCCESS CRITERIA</text><text x="995" y="220" fill="#E8ECFF" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="22" font-weight="900" text-anchor="middle">每阶段过线标准</text><line x1="800" x2="1190" y1="245" y2="245" stroke="#FFF" stroke-opacity=".14"/><g id="sc-1"><circle cx="816" cy="282" r="14" fill="#5B8DEF" fill-opacity=".3"/><text x="816" y="287" fill="#5B8DEF" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="900" text-anchor="middle">01</text><text x="844" y="276" fill="#E8ECFF" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="15" font-weight="700">原型 → 工程化</text><text x="844" y="298" fill="#A8B0D0" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="500">金标准 case 通过率 ≥ 80%</text></g><g id="sc-2"><circle cx="816" cy="354" r="14" fill="#A26BFA" fill-opacity=".3"/><text x="816" y="359" fill="#A26BFA" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="900" text-anchor="middle">02</text><text x="844" y="348" fill="#E8ECFF" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="15" font-weight="700">工程化 → 规模化</text><text x="844" y="370" fill="#A8B0D0" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="500">评估集 ≥ 100 · 自动回归绿灯</text></g><g id="sc-3"><circle cx="816" cy="426" r="14" fill="#3DDDFC" fill-opacity=".3"/><text x="816" y="431" fill="#3DDDFC" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="900" text-anchor="middle">03</text><text x="844" y="420" fill="#E8ECFF" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="15" font-weight="700">规模化 → 生产</text><text x="844" y="442" fill="#A8B0D0" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="500">P95 &lt; 5s · 单次成本 &lt; ¥0.5</text></g><g id="sc-4"><circle cx="816" cy="498" r="14" fill="#4ADE80" fill-opacity=".3"/><text x="816" y="503" fill="#4ADE80" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="900" text-anchor="middle">04</text><text x="844" y="492" fill="#E8ECFF" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="15" font-weight="700">生产持续运营</text><text x="844" y="514" fill="#A8B0D0" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="500">30 天 SLO ≥ 99.5% · 成本月度下降</text></g><line x1="800" x2="1190" y1="545" y2="545" stroke="#FFF" stroke-opacity=".12"/><text x="816" y="580" fill="#A8B0D0" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="14" font-weight="700">⚡ 不达标不晋级 — 每个阶段</text><text x="816" y="604" fill="#A8B0D0" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="14" font-weight="700">必须有&quot;通关&quot;硬指标</text><text x="816" y="628" fill="#6B7299" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="500">否则只是&quot;进度&quot;假象</text></g><g id="footer"><text x="60" y="700" fill="#6B7299" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="600">路线图 · 12 周可执行计划</text><text x="1220" y="700" fill="#6B7299" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="600" text-anchor="end">11 / 12</text></g></svg>