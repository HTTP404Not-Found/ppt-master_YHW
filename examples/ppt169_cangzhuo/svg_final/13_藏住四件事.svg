<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#F5F1E8"/><text x="60" y="80" fill="#1A1A1A" font-family="KaiTi, Georgia, serif" font-size="44" font-weight="700" letter-spacing="3">藏住四件事 · 养出四种力</text><line x1="60" x2="160" y1="100" y2="100" stroke="brown" stroke-width="3"/><text x="60" y="135" fill="#5C5852" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" letter-spacing="2">核心输出 · 把&quot;藏&quot;翻译成可执行的四条原则</text><line x1="120" x2="120" y1="180" y2="640" stroke="#1A1A1A" stroke-width="2"/><g transform="translate(0, 180)"><circle cx="120" cy="30" r="28" fill="#1A1A1A"/><text x="120" y="38" fill="#F5F1E8" font-family="KaiTi, Georgia, serif" font-size="20" font-weight="700" text-anchor="middle">壹</text><line x1="148" x2="200" y1="30" y2="30" stroke="#1A1A1A" stroke-dasharray="4 3" stroke-width="1.5"/><g fill="none" stroke="brown" stroke-width="1.5"><path d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.572" transform="translate(210.0, 8.0) scale(1.8333333333333333)"/></g><text x="270" y="22" fill="#1A1A1A" font-family="KaiTi, Georgia, serif" font-size="28" font-weight="700" letter-spacing="3">藏住情绪</text><text x="270" y="50" fill="#5C5852" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="16">脸上不写出来，对方就没有抓手</text><text x="700" y="36" fill="brown" font-family="KaiTi, Georgia, serif" font-size="28" letter-spacing="3" text-anchor="middle">⟶</text><text x="770" y="42" fill="#1A1A1A" font-family="KaiTi, Georgia, serif" font-size="32" font-weight="700" letter-spacing="4">不被几句话激怒</text></g><g transform="translate(0, 290)"><circle cx="120" cy="30" r="28" fill="#1A1A1A"/><text x="120" y="38" fill="#F5F1E8" font-family="KaiTi, Georgia, serif" font-size="20" font-weight="700" text-anchor="middle">贰</text><line x1="148" x2="200" y1="30" y2="30" stroke="#1A1A1A" stroke-dasharray="