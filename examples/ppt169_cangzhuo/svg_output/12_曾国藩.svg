<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#F5F1E8"/><defs><clipPath id="zeng_round"><rect width="500" height="500" x="60" y="160" rx="12" ry="12"/></clipPath></defs><image width="500" height="500" x="60" y="160" clip-path="url(#zeng_round)" href="../images/zengguofan_lamp.png" preserveAspectRatio="xMidYMid slice"/><rect width="500" height="500" x="60" y="160" fill="none" stroke="#C8C0AE" stroke-width="1" rx="12" ry="12"/><text x="60" y="80" fill="#1A1A1A" font-family="KaiTi, Georgia, serif" font-size="44" font-weight="700" letter-spacing="3">曾国藩 · 笨功夫</text><line x1="60" x2="160" y1="100" y2="100" stroke="brown" stroke-width="3"/><text x="60" y="135" fill="#5C5852" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" letter-spacing="2">不靠聪明 · 靠&quot;拙到深处&quot; 把局势拉到自己这边</text><g transform="translate(620, 200)"><text x="0" y="0" fill="#8B8680" font-family="KaiTi, Georgia, serif" font-size="22" letter-spacing="3">早年并不以聪明见长</text><text x="0" y="36" fill="#8B8680" font-family="KaiTi, Georgia, serif" font-size="22" letter-spacing="3">甚至常被认为迟钝</text><line x1="0" x2="80" y1="70" y2="70" stroke="brown" stroke-width="2"/><text x="0" y="125" fill="#1A1A1A" font-family="KaiTi, Georgia, serif" font-size="40" font-weight="700" letter-spacing="6">笨 功 夫</text><text x="0" y="160" fill="#5C5852" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18">读书一字一字读，不跳行</text><text x="0" y="220" fill="#1A1A1A" font-family="KaiTi, Georgia, serif" font-size="40" font-weight="700" letter-spacing="6">慢 功 夫</text><text x="0" y="255" fill="#5C5852" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18">每天写日记，三十年不断</text><text x="0" y="315" fill="#1A1A1A" font-family="KaiTi, Georgia, serif" font-size="40" font-weight="700" letter-spacing="6">深 功 夫</text><text x="0" y="350" fill="#5C5852" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18">不争一时快，不贪一寸巧</text><rect width="600" height="80" x="0" y="390" fill="#1A1A1A"/><rect width="6" height="80" x="0" y="390" fill="brown"/><text x="24" y="424" fill="#F5F1E8" font-family="KaiTi, Georgia, serif" font-size="22" letter-spacing="3">拙到深处 · 是 定 力</text><text x="24" y="456" fill="#C8C0AE" font-family="KaiTi, Georgia, serif" font-size="22" letter-spacing="2">定力够了，局势才会慢慢站到他这边</text></g><text x="60" y="700" fill="#8B8680" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14">藏拙 · 十</text><text x="1220" y="700" fill="#8B8680" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" text-anchor="end">12</text></svg>