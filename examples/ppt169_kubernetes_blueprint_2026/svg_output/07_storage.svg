<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><pattern id="bpGridMajor" width="40" height="40" x="0" y="0" data-pptx-pattern="lgGrid" patternUnits="userSpaceOnUse"><rect width="40" height="40" fill="#0E2A47"/><path fill="none" stroke="#2D4A6B" stroke-width=".6" d="M 40 0 L 0 0 0 40"/></pattern><pattern id="bpGridMinor" width="8" height="8" x="0" y="0" data-pptx-pattern="smGrid" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#0E2A47"/><path fill="none" stroke="#1A3A5C" stroke-width=".3" d="M 8 0 L 0 0 0 8"/></pattern><marker id="arrowCyan2" markerHeight="10" markerWidth="10" orient="auto" refX="9" refY="5"><path fill="#5BA3E0" d="M 0,0 L 10,5 L 0,10 Z"/></marker></defs><g id="bg"><rect width="1280" height="720" fill="#0E2A47"/><rect width="1280" height="720" fill="url(#bpGridMinor)" opacity=".4"/><rect width="1280" height="720" fill="url(#bpGridMajor)" opacity=".6"/></g><g id="header"><text x="60" y="42" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="bold">Storage: PV / PVC / StorageClass</text><text x="1220" y="42" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="end">P07 / 10</text><line x1="60" x2="1220" y1="58" y2="58" stroke="#2D4A6B" stroke-width=".5"/><text x="60" y="78" fill="#6B85A3" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13">PERSISTENT STORAGE IS A THREE-RESOURCE CONTRACT · POD CLAIM + ADMIN PROVISIONER</text></g><g id="stack-diagram"><text x="80" y="120" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11">CONSUMER STACK · TOP → BOTTOM</text><g id="layer-pod"><rect width="500" height="60" x="80" y="140" fill="#0E2A47" stroke="#7FD99F" stroke-width="1.5"/><rect width="6" height="60" x="80" y="140" fill="#7FD99F"/><use width="32" height="32" x="100" y="153" fill="#7FD99F" stroke-width="1.5" data-icon="tabler-outline/cube"/><text x="145" y="167" fill="#7FD99F" font-family="Consolas, 'Courier New', monospace" font-size="14" font-weight="bold">Pod</text><text x="180" y="167" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">— consumes storage via</text><text x="145" y="187" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="12">volumes[].persistentVolumeClaim.claimName</text></g><line x1="180" x2="180" y1="200" y2="225" stroke="#5BA3E0" stroke-width="1.5" marker-end="url(#arrowCyan2)"/><text x="195" y="218" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="10">claims</text><g id="layer-pvc"><rect width="500" height="80" x="80" y="232" fill="#0E2A47" stroke="#FFB627" stroke-width="1.8"/><rect width="6" height="80" x="80" y="232" fill="#FFB627"/><use width="30" height="30" x="100" y="248" fill="#FFB627" stroke-width="1.5" data-icon="tabler-outline/contract"/><text x="145" y="263" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="14" font-weight="bold">PersistentVolumeClaim</text><text x="362" y="263" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">— pvc — namespaced</text><text x="145" y="284" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">request: size + accessModes + storageClassName</text><text x="145" y="301" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="11">like a Pod requesting CPU/RAM — but for disk</text></g><line x1="180" x2="180" y1="312" y2="337" stroke="#5BA3E0" stroke-width="1.5" marker-end="url(#arrowCyan2)"/><text x="195" y="330" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="10">binds 1:1</text><g id="layer-pv"><rect width="500" height="80" x="80" y="344" fill="#0E2A47" stroke="#5BA3E0" stroke-width="1.5"/><rect width="6" height="80" x="80" y="344" fill="#5BA3E0"/><use width="30" height="30" x="100" y="360" fill="#5BA3E0" stroke-width="1.5" data-icon="tabler-outline/device-floppy"/><text x="145" y="375" fill="#5BA3E0" font-family="Consolas, 'Courier New', monospace" font-size="14" font-weight="bold">PersistentVolume</text><text x="316" y="375" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">— pv — cluster-scoped</text><text x="145" y="396" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">a concrete storage resource (NFS / iSCSI / cloud disk)</text><text x="145" y="413" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="11">lifecycle independent of any Pod</text></g><line x1="180" x2="180" y1="424" y2="449" stroke="#5BA3E0" stroke-dasharray="3 3" stroke-width="1" marker-end="url(#arrowCyan2)"/><text x="195" y="442" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="10">backing media</text><g id="layer-backend"><rect width="500" height="60" x="80" y="456" fill="#0E2A47" stroke="#3E7AB8" stroke-dasharray="5 3" stroke-width="1.2"/><rect width="6" height="60" x="80" y="456" fill="#3E7AB8"/><use width="30" height="30" x="100" y="468" fill="#3E7AB8" stroke-width="1.5" data-icon="tabler-outline/server"/><text x="145" y="483" fill="#3E7AB8" font-family="Consolas, 'Courier New', monospace" font-size="13" font-weight="bold">Storage backend</text><text x="145" y="504" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">EBS · Persistent Disk · Ceph RBD · NFS · iSCSI · LonghornFS</text></g></g><g id="provisioner-spine"><text x="640" y="120" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11">PROVISIONER SPINE · ADMIN SIDE</text><rect width="540" height="376" x="640" y="140" fill="#1A3A5C" fill-opacity=".3" stroke="#3E7AB8" stroke-dasharray="4 4" stroke-width=".6"/><g id="storage-class"><rect width="500" height="100" x="660" y="160" fill="#0E2A47" stroke="#FFB627" stroke-width="1.5"/><rect width="6" height="100" x="660" y="160" fill="#FFB627"/><use width="30" height="30" x="680" y="178" fill="#FFB627" stroke-width="1.5" data-icon="tabler-outline/template"/><text x="722" y="193" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="14" font-weight="bold">StorageClass</text><text x="862" y="193" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">— admin recipe</text><text x="722" y="214" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">defines: provisioner + parameters + reclaimPolicy</text><text x="722" y="231" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">PVC requests by name → PV is created on demand</text><text x="722" y="251" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="11">enables <tspan fill="#FFB627" font-weight="bold">dynamic provisioning</tspan> — no static PV setup</text></g><g id="csi-driver"><rect width="500" height="80" x="660" y="280" fill="#0E2A47" stroke="#5BA3E0" stroke-width="1.3"/><rect width="6" height="80" x="660" y="280" fill="#5BA3E0"/><use width="30" height="30" x="680" y="296" fill="#5BA3E0" stroke-width="1.5" data-icon="tabler-outline/plug-connected"/><text x="722" y="311" fill="#5BA3E0" font-family="Consolas, 'Courier New', monospace" font-size="14" font-weight="bold">CSI Driver</text><text x="832" y="311" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">— Container Storage Interface</text><text x="722" y="333" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">vendor plugin that creates / attaches / mounts volumes</text><text x="722" y="349" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="11">replaces deprecated in-tree storage plugins</text></g><g id="access-modes"><text x="660" y="392" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="11">▼ ACCESS MODES</text><rect width="120" height="40" x="660" y="402" fill="none" stroke="#5BA3E0" stroke-width="1"/><text x="720" y="423" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle">RWO</text><text x="720" y="436" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="9" text-anchor="middle">1 node, R/W</text><rect width="120" height="40" x="785" y="402" fill="none" stroke="#5BA3E0" stroke-width="1"/><text x="845" y="423" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle">ROX</text><text x="845" y="436" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="9" text-anchor="middle">many nodes, RO</text><rect width="120" height="40" x="910" y="402" fill="none" stroke="#5BA3E0" stroke-width="1"/><text x="970" y="423" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle">RWX</text><text x="970" y="436" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="9" text-anchor="middle">many nodes, R/W</text><rect width="120" height="40" x="1035" y="402" fill="none" stroke="#FFB627" stroke-width="1"/><text x="1095" y="423" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle">RWOP</text><text x="1095" y="436" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="9" text-anchor="middle">1 pod, R/W</text></g><g id="reclaim"><text x="660" y="476" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="11">▼ RECLAIM POLICY</text><rect width="160" height="22" x="660" y="486" fill="none" stroke="#5BA3E0" stroke-width="1"/><text x="740" y="501" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="middle">Retain</text><rect width="160" height="22" x="830" y="486" fill="none" stroke="#5BA3E0" stroke-width="1"/><text x="910" y="501" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="middle">Delete (default)</text><rect width="160" height="22" x="1000" y="486" fill="none" stroke="#3E7AB8" stroke-dasharray="3 3" stroke-width="1"/><text x="1080" y="501" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="middle">Recycle ✗ deprecated</text></g></g><g id="provisioning-mode"><rect width="1100" height="100" x="80" y="540" fill="#1A3A5C" fill-opacity=".4" stroke="#5BA3E0" stroke-width="1"/><text x="100" y="565" fill="#5BA3E0" font-family="Consolas, 'Courier New', monospace" font-size="13" font-weight="bold">PROVISIONING MODES</text><rect width="500" height="50" x="100" y="580" fill="none" stroke="#5BA3E0" stroke-width=".8"/><text x="116" y="600" fill="#5BA3E0" font-family="Consolas, 'Courier New', monospace" font-size="12" font-weight="bold">STATIC</text><text x="180" y="600" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">— admin creates PVs in advance</text><text x="116" y="618" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">PVC matches → controller binds 1:1 via ClaimRef</text><rect width="540" height="50" x="620" y="580" fill="none" stroke="#FFB627" stroke-width="1"/><text x="636" y="600" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="12" font-weight="bold">DYNAMIC</text><text x="708" y="600" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">— StorageClass provisions on demand</text><text x="636" y="618" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">requires <tspan fill="#FFB627" font-family="Consolas, 'Courier New', monospace">DefaultStorageClass</tspan> admission controller</text></g><g id="footer"><line x1="60" x2="1220" y1="680" y2="680" stroke="#2D4A6B" stroke-width=".5"/><text x="60" y="700" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11">K8S-ARCH-2026 · DRAWING 07 OF 10 · STORAGE</text><text x="1220" y="700" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="end">SHEET 07 OF 10</text></g></svg>