<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><pattern id="bpGridMajor" width="40" height="40" x="0" y="0" data-pptx-pattern="lgGrid" patternUnits="userSpaceOnUse"><rect width="40" height="40" fill="#0E2A47"/><path fill="none" stroke="#2D4A6B" stroke-width=".6" d="M 40 0 L 0 0 0 40"/></pattern><pattern id="bpGridMinor" width="8" height="8" x="0" y="0" data-pptx-pattern="smGrid" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#0E2A47"/><path fill="none" stroke="#1A3A5C" stroke-width=".3" d="M 8 0 L 0 0 0 8"/></pattern><radialGradient id="hubGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFB627" stop-opacity=".25"/><stop offset="100%" stop-color="#FFB627" stop-opacity="0"/></radialGradient></defs><g id="bg"><rect width="1280" height="720" fill="#0E2A47"/><rect width="1280" height="720" fill="url(#bpGridMinor)" opacity=".4"/><rect width="1280" height="720" fill="url(#bpGridMajor)" opacity=".6"/></g><g id="header"><text x="60" y="42" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="bold">The Control Plane: Five Components</text><text x="1220" y="42" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="end">P03 / 10</text><line x1="60" x2="1220" y1="58" y2="58" stroke="#2D4A6B" stroke-width=".5"/><text x="60" y="78" fill="#6B85A3" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13">ONE HUB · ONE PERSISTENT STORE · THREE SATELLITE LOOPS · ONE OPTIONAL CLOUD ADAPTER</text></g><g id="orbit-rings"><circle cx="640" cy="410" r="220" fill="none" stroke="#3E7AB8" stroke-dasharray="2 6" stroke-width=".5" opacity=".4"/><circle cx="640" cy="410" r="160" fill="none" stroke="#3E7AB8" stroke-dasharray="4 4" stroke-width=".6" opacity=".5"/><circle cx="640" cy="410" r="270" fill="none" stroke="#3E7AB8" stroke-dasharray="1 5" stroke-width=".4" opacity=".3"/></g><g id="spokes"><line x1="640" x2="640" y1="410" y2="200" stroke="#FFB627" stroke-width="1.5"/><line x1="640" x2="855" y1="410" y2="290" stroke="#5BA3E0" stroke-width="1.2"/><line x1="640" x2="855" y1="410" y2="530" stroke="#5BA3E0" stroke-width="1.2"/><line x1="640" x2="425" y1="410" y2="530" stroke="#5BA3E0" stroke-width="1.2"/><line x1="640" x2="425" y1="410" y2="290" stroke="#3E7AB8" stroke-dasharray="4 3" stroke-width="1.2"/></g><g id="hub-apiserver"><circle cx="640" cy="410" r="110" fill="url(#hubGlow)"/><polygon fill="#0E2A47" stroke="#FFB627" stroke-width="2" points="640 330 700 365 700 455 640 490 580 455 580 365"/><line x1="640" x2="640" y1="330" y2="410" stroke="#FFB627" stroke-width="1.2"/><line x1="640" x2="580" y1="410" y2="365" stroke="#FFB627" stroke-width="1.2"/><line x1="640" x2="700" y1="410" y2="365" stroke="#FFB627" stroke-width="1.2"/><text x="640" y="430" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="middle">kube-apiserver</text><text x="640" y="450" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">REST + admission</text><text x="640" y="466" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">+ validation</text><text x="640" y="484" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">HUB · scales horizontally</text></g><g id="spoke-etcd"><rect width="200" height="84" x="540" y="148" fill="#0E2A47" stroke="#FFB627" stroke-width="1.8"/><rect width="6" height="84" x="540" y="148" fill="#FFB627"/><use width="22" height="22" x="556" y="166" fill="#FFB627" stroke-width="1.5" data-icon="tabler-outline/database"/><text x="588" y="184" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="14" font-weight="bold">etcd</text><text x="556" y="206" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">Distributed K/V store</text><text x="556" y="222" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">Raft · all cluster state</text><line x1="640" x2="640" y1="232" y2="280" stroke="#FFB627" stroke-dasharray="2 3" stroke-width="1"/><text x="660" y="260" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="9">↕ only direct talker</text></g><g id="spoke-scheduler"><rect width="220" height="84" x="800" y="248" fill="#0E2A47" stroke="#5BA3E0" stroke-width="1.5"/><rect width="6" height="84" x="800" y="248" fill="#5BA3E0"/><use width="22" height="22" x="816" y="266" fill="#5BA3E0" stroke-width="1.5" data-icon="tabler-outline/settings"/><text x="848" y="284" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="13" font-weight="bold">kube-scheduler</text><text x="816" y="306" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">filter → score → bind</text><text x="816" y="322" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">picks node per Pod</text></g><g id="spoke-controller"><rect width="220" height="84" x="800" y="488" fill="#0E2A47" stroke="#5BA3E0" stroke-width="1.5"/><rect width="6" height="84" x="800" y="488" fill="#5BA3E0"/><use width="22" height="22" x="816" y="506" fill="#5BA3E0" stroke-width="1.5" data-icon="tabler-outline/refresh"/><text x="848" y="524" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="12" font-weight="bold">controller-manager</text><text x="816" y="546" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">N reconcile loops</text><text x="816" y="562" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">watch · diff · act</text></g><g id="spoke-cloud"><rect width="200" height="84" x="260" y="248" fill="#0E2A47" stroke="#3E7AB8" stroke-dasharray="5 3" stroke-width="1.5"/><rect width="6" height="84" x="260" y="248" fill="#3E7AB8"/><use width="22" height="22" x="276" y="266" fill="#3E7AB8" stroke-width="1.5" data-icon="tabler-outline/cloud"/><text x="308" y="284" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="12" font-weight="bold">cloud-ctrl-mgr</text><text x="276" y="306" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">LB · routes · nodes</text><text x="276" y="322" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="10">optional · cloud only</text></g><g id="spoke-kubectl"><rect width="200" height="84" x="260" y="488" fill="#0E2A47" stroke="#5BA3E0" stroke-width="1.5"/><rect width="6" height="84" x="260" y="488" fill="#5BA3E0"/><use width="22" height="22" x="276" y="506" fill="#5BA3E0" stroke-width="1.5" data-icon="tabler-outline/terminal"/><text x="308" y="524" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="13" font-weight="bold">kubectl / clients</text><text x="276" y="546" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">CLI · operators · CI</text><text x="276" y="562" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">HTTPS REST</text></g><g id="annotations"><line x1="75" x2="120" y1="148" y2="148" stroke="#FFB627" stroke-width=".8"/><line x1="75" x2="75" y1="148" y2="232" stroke="#FFB627" stroke-width=".8"/><text x="75" y="143" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="9">PERSISTENCE</text><line x1="1080" x2="1140" y1="290" y2="290" stroke="#5BA3E0" stroke-width=".8"/><line x1="1140" x2="1140" y1="290" y2="530" stroke="#5BA3E0" stroke-width=".8"/><line x1="1080" x2="1140" y1="530" y2="530" stroke="#5BA3E0" stroke-width=".8"/><text x="1148" y="394" fill="#5BA3E0" font-family="Consolas, 'Courier New', monospace" font-size="9">RECONCILE</text><text x="1148" y="410" fill="#5BA3E0" font-family="Consolas, 'Courier New', monospace" font-size="9">LOOPS</text><line x1="140" x2="200" y1="290" y2="290" stroke="#3E7AB8" stroke-width=".8"/><line x1="140" x2="140" y1="290" y2="332" stroke="#3E7AB8" stroke-width=".8"/><text x="80" y="316" fill="#3E7AB8" font-family="Consolas, 'Courier New', monospace" font-size="9">CLOUD GLUE</text></g><g id="key-fact"><rect width="1160" height="40" x="60" y="615" fill="#1A3A5C" fill-opacity=".6" stroke="#FFB627" stroke-width=".8"/><use width="22" height="22" x="76" y="624" fill="#FFB627" stroke-width="1.5" data-icon="tabler-outline/info-circle"/><text x="108" y="640" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13">Every state transition flows through <tspan fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-weight="bold">kube-apiserver</tspan>; only the apiserver talks to <tspan fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-weight="bold">etcd</tspan>. Every other component is a watcher of the API surface.</text></g><g id="footer"><line x1="60" x2="1220" y1="680" y2="680" stroke="#2D4A6B" stroke-width=".5"/><text x="60" y="700" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11">K8S-ARCH-2026 · DRAWING 03 OF 10 · CONTROL PLANE</text><text x="1220" y="700" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="end">SHEET 03 OF 10</text></g></svg>