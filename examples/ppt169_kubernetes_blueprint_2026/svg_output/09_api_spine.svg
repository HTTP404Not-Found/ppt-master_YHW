<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><pattern id="bpGridMajor" width="40" height="40" x="0" y="0" data-pptx-pattern="lgGrid" patternUnits="userSpaceOnUse"><rect width="40" height="40" fill="#0E2A47"/><path fill="none" stroke="#2D4A6B" stroke-width=".6" d="M 40 0 L 0 0 0 40"/></pattern><pattern id="bpGridMinor" width="8" height="8" x="0" y="0" data-pptx-pattern="smGrid" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#0E2A47"/><path fill="none" stroke="#1A3A5C" stroke-width=".3" d="M 8 0 L 0 0 0 8"/></pattern><marker id="arrow09Cyan" markerHeight="10" markerWidth="10" orient="auto" refX="9" refY="5"><path fill="#5BA3E0" d="M 0,0 L 10,5 L 0,10 Z"/></marker><marker id="arrow09Amber" markerHeight="10" markerWidth="10" orient="auto" refX="9" refY="5"><path fill="#FFB627" d="M 0,0 L 10,5 L 0,10 Z"/></marker><radialGradient id="apiGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFB627" stop-opacity=".25"/><stop offset="100%" stop-color="#FFB627" stop-opacity="0"/></radialGradient></defs><g id="bg"><rect width="1280" height="720" fill="#0E2A47"/><rect width="1280" height="720" fill="url(#bpGridMinor)" opacity=".4"/><rect width="1280" height="720" fill="url(#bpGridMajor)" opacity=".6"/></g><g id="header"><text x="60" y="42" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="bold">Every Line Crosses the API Server</text><text x="1220" y="42" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="end">P09 / 10</text><line x1="60" x2="1220" y1="58" y2="58" stroke="#2D4A6B" stroke-width=".5"/><text x="60" y="78" fill="#6B85A3" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13">NO COMPONENT TALKS DIRECTLY TO ANOTHER — ALL FLOWS GO THROUGH kube-apiserver</text></g><g id="lane-labels"><text x="180" y="115" fill="#5BA3E0" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="middle">CLIENTS / WATCHERS</text><text x="640" y="115" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="middle">SPINE</text><text x="1100" y="115" fill="#5BA3E0" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="middle">PERSISTENCE</text><line x1="60" x2="1220" y1="125" y2="125" stroke="#2D4A6B" stroke-width=".5"/></g><g id="cli-kubectl"><rect width="200" height="56" x="80" y="155" fill="#0E2A47" stroke="#5BA3E0" stroke-width="1.3"/><rect width="4" height="56" x="80" y="155" fill="#5BA3E0"/><use width="24" height="24" x="96" y="170" fill="#5BA3E0" stroke-width="1.5" data-icon="tabler-outline/terminal"/><text x="130" y="180" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="12" font-weight="bold">kubectl</text><text x="130" y="198" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10">CLI · scripts · CI/CD</text></g><g id="cli-sched"><rect width="200" height="56" x="80" y="225" fill="#0E2A47" stroke="#5BA3E0" stroke-width="1.3"/><rect width="4" height="56" x="80" y="225" fill="#5BA3E0"/><use width="24" height="24" x="96" y="240" fill="#5BA3E0" stroke-width="1.5" data-icon="tabler-outline/settings"/><text x="130" y="250" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="12" font-weight="bold">kube-scheduler</text><text x="130" y="268" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10">picks node for Pod</text></g><g id="cli-ctrl"><rect width="200" height="56" x="80" y="295" fill="#0E2A47" stroke="#5BA3E0" stroke-width="1.3"/><rect width="4" height="56" x="80" y="295" fill="#5BA3E0"/><use width="24" height="24" x="96" y="310" fill="#5BA3E0" stroke-width="1.5" data-icon="tabler-outline/refresh"/><text x="130" y="320" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="11" font-weight="bold">controller-mgr</text><text x="130" y="338" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10">reconcile loops</text></g><g id="cli-kubelet"><rect width="200" height="56" x="80" y="365" fill="#0E2A47" stroke="#5BA3E0" stroke-width="1.3"/><rect width="4" height="56" x="80" y="365" fill="#5BA3E0"/><use width="24" height="24" x="96" y="380" fill="#5BA3E0" stroke-width="1.5" data-icon="tabler-outline/cube"/><text x="130" y="390" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="12" font-weight="bold">kubelet (node)</text><text x="130" y="408" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10">node-side agent · ≥1 per node</text></g><g id="cli-proxy"><rect width="200" height="56" x="80" y="435" fill="#0E2A47" stroke="#5BA3E0" stroke-width="1.3"/><rect width="4" height="56" x="80" y="435" fill="#5BA3E0"/><use width="24" height="24" x="96" y="450" fill="#5BA3E0" stroke-width="1.5" data-icon="tabler-outline/route"/><text x="130" y="460" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="12" font-weight="bold">kube-proxy</text><text x="130" y="478" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10">Service rule programmer</text></g><g id="cli-cloud"><rect width="200" height="56" x="80" y="505" fill="#0E2A47" stroke="#3E7AB8" stroke-dasharray="4 3" stroke-width="1.2"/><rect width="4" height="56" x="80" y="505" fill="#3E7AB8"/><use width="24" height="24" x="96" y="520" fill="#3E7AB8" stroke-width="1.5" data-icon="tabler-outline/cloud"/><text x="130" y="530" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="11" font-weight="bold">cloud-ctrl-mgr</text><text x="130" y="548" fill="#6B85A3" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10">optional · cloud only</text></g><g id="api-spine"><circle cx="640" cy="360" r="180" fill="url(#apiGlow)"/><rect width="200" height="360" x="540" y="180" fill="#0E2A47" stroke="#FFB627" stroke-width="2"/><rect width="200" height="36" x="540" y="180" fill="#FFB627"/><text x="640" y="204" fill="#0E2A47" font-family="Consolas, 'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">★ SPINE</text><text x="640" y="245" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="16" font-weight="bold" text-anchor="middle">kube-apiserver</text><line x1="560" x2="720" y1="263" y2="263" stroke="#FFB627" stroke-width=".5"/><text x="640" y="290" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" text-anchor="middle">REST API surface</text><text x="640" y="310" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">• authn / authz</text><text x="640" y="328" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">• admission webhooks</text><text x="640" y="346" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">• validation</text><text x="640" y="364" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">• mutation</text><line x1="560" x2="720" y1="380" y2="380" stroke="#FFB627" stroke-width=".5"/><text x="640" y="406" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="middle">scales horizontally</text><text x="640" y="424" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">N replicas behind LB</text><line x1="560" x2="720" y1="445" y2="445" stroke="#FFB627" stroke-width=".5"/><text x="640" y="471" fill="#7FD99F" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="middle">watch · long-poll</text><text x="640" y="489" fill="#7FD99F" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="middle">+ list streams</text><text x="640" y="513" fill="#6B85A3" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10" text-anchor="middle">every component watches</text><text x="640" y="528" fill="#6B85A3" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10" text-anchor="middle">to drive its reconcile loop</text></g><g id="persistence-column"><rect width="200" height="140" x="1000" y="290" fill="#0E2A47" stroke="#FFB627" stroke-width="2"/><rect width="200" height="30" x="1000" y="290" fill="#FFB627"/><text x="1100" y="310" fill="#0E2A47" font-family="Consolas, 'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle">SOLE STORAGE</text><use width="34" height="34" x="1018" y="335" fill="#FFB627" stroke-width="1.5" data-icon="tabler-outline/database"/><text x="1100" y="358" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="16" font-weight="bold" text-anchor="middle">etcd</text><text x="1100" y="380" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">Raft K/V cluster</text><text x="1100" y="398" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">all cluster state</text><line x1="1018" x2="1182" y1="410" y2="410" stroke="#FFB627" stroke-width=".4"/><text x="1100" y="424" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">3 or 5 members · odd</text></g><g id="watch-arrows"><line x1="280" x2="540" y1="183" y2="218" stroke="#5BA3E0" stroke-width="1.5" marker-end="url(#arrow09Cyan)"/><text x="295" y="173" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="9">POST · PUT</text><line x1="280" x2="540" y1="253" y2="263" stroke="#5BA3E0" stroke-width="1.5" marker-end="url(#arrow09Cyan)"/><text x="305" y="244" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="9">watch unscheduled</text><line x1="540" x2="280" y1="290" y2="270" stroke="#7FD99F" stroke-width="1.2" marker-end="url(#arrow09Cyan)"/><text x="338" y="285" fill="#7FD99F" font-family="Consolas, 'Courier New', monospace" font-size="9">bind decision</text><line x1="280" x2="540" y1="323" y2="333" stroke="#5BA3E0" stroke-width="1.5" marker-end="url(#arrow09Cyan)"/><text x="320" y="316" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="9">watch + patch</text><line x1="280" x2="540" y1="393" y2="403" stroke="#5BA3E0" stroke-width="1.5" marker-end="url(#arrow09Cyan)"/><text x="320" y="386" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="9">watch pods/node</text><line x1="540" x2="280" y1="425" y2="420" stroke="#7FD99F" stroke-width="1.2" marker-end="url(#arrow09Cyan)"/><text x="380" y="418" fill="#7FD99F" font-family="Consolas, 'Courier New', monospace" font-size="9">report status</text><line x1="280" x2="540" y1="463" y2="475" stroke="#5BA3E0" stroke-width="1.5" marker-end="url(#arrow09Cyan)"/><text x="318" y="456" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="9">watch services</text><line x1="280" x2="540" y1="533" y2="510" stroke="#3E7AB8" stroke-dasharray="4 3" stroke-width="1.2" marker-end="url(#arrow09Cyan)"/><text x="320" y="523" fill="#3E7AB8" font-family="Consolas, 'Courier New', monospace" font-size="9">cloud sync (optional)</text><line x1="740" x2="1000" y1="345" y2="345" stroke="#FFB627" stroke-width="2" marker-end="url(#arrow09Amber)"/><line x1="1000" x2="740" y1="375" y2="375" stroke="#FFB627" stroke-width="2" marker-end="url(#arrow09Amber)"/><text x="870" y="335" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="middle">gRPC · write</text><text x="870" y="395" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="middle">gRPC · read</text></g><g id="bottom-takeaway"><rect width="1160" height="74" x="60" y="588" fill="#1A3A5C" fill-opacity=".6" stroke="#FFB627" stroke-width="1"/><use width="32" height="32" x="76" y="608" fill="#FFB627" stroke-width="1.5" data-icon="tabler-outline/route"/><text x="120" y="615" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="13" font-weight="bold">WHY THIS MATTERS</text><text x="120" y="638" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13">API-mediation makes Kubernetes <tspan fill="#FFB627" font-weight="bold">pluggable</tspan> (any controller can join the loop by watching the API), <tspan fill="#FFB627" font-weight="bold">observable</tspan> (every state change is an API event), and <tspan fill="#FFB627" font-weight="bold">auditable</tspan>.</text><text x="120" y="656" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12">The constraint <tspan fill="#FFB627" font-family="Consolas, 'Courier New', monospace">&quot;all roads through apiserver&quot;</tspan> is the architecture, not an inconvenience.</text></g><g id="footer"><line x1="60" x2="1220" y1="680" y2="680" stroke="#2D4A6B" stroke-width=".5"/><text x="60" y="700" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11">K8S-ARCH-2026 · DRAWING 09 OF 10 · API SPINE</text><text x="1220" y="700" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="end">SHEET 09 OF 10</text></g></svg>