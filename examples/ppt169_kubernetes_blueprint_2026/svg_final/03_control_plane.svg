6666)"/><path d="M11 12h1v4h1" transform="translate(76.0, 624.0) scale(0.9166666666666666)"/></g><text x="108" y="640" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13">Every state transition flows through <tspan fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-weight="bold">kube-apiserver</tspan>; only the apiserver talks to <tspan fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-weight="bold">etcd</tspan>. Every other component is a watcher of the API surface.</text></g><g id="footer"><line x1="60" x2="1220" y1="680" y2="680" stroke="#2D4A6B" stroke-width=".5"/><text x="60" y="700" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11">K8S-ARCH-2026 · DRAWING 03 OF 10 · CONTROL PLANE</text><text x="1220" y="700" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="end">SHEET 03 OF 10</text></g></svg>