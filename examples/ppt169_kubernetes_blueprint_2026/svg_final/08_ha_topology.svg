<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><pattern id="bpGridMajor" width="40" height="40" x="0" y="0" data-pptx-pattern="lgGrid" patternUnits="userSpaceOnUse"><rect width="40" height="40" fill="#0E2A47"/><path fill="none" stroke="#2D4A6B" stroke-width=".6" d="M 40 0 L 0 0 0 40"/></pattern><pattern id="bpGridMinor" width="8" height="8" x="0" y="0" data-pptx-pattern="smGrid" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#0E2A47"/><path fill="none" stroke="#1A3A5C" stroke-width=".3" d="M 8 0 L 0 0 0 8"/></pattern></defs><g id="bg"><rect width="1280" height="720" fill="#0E2A47"/><rect width="1280" height="720" fill="url(#bpGridMinor)" opacity=".4"/><rect width="1280" height="720" fill="url(#bpGridMajor)" opacity=".6"/></g><g id="header"><text x="60" y="42" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="bold">HA Topology: Stacked or External</text><text x="1220" y="42" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="end">P08 / 10</text><line x1="60" x2="1220" y1="58" y2="58" stroke="#2D4A6B" stroke-width=".5"/><text x="60" y="78" fill="#6B85A3" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13">PRODUCTION CLUSTERS NEED ≥3 CONTROL-PLANE HOSTS · ODD-NUMBERED ETCD MEMBERS</text></g><g id="stacked-topology"><rect width="560" height="500" x="80" y="110" fill="#1A3A5C" fill-opacity=".3" stroke="#5BA3E0" stroke-dasharray="4 4" stroke-width=".8"/><text x="100" y="135" fill="#5BA3E0" font-family="Consolas, 'Courier New', monospace" font-size="14" font-weight="bold">[ TOPOLOGY A ] STACKED</text><text x="100" y="155" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12">etcd co-located with control-plane host</text><line x1="80" x2="640" y1="170" y2="170" stroke="#5BA3E0" stroke-width=".5"/><g id="stacked-host-1"><polygon fill="#0E2A47" stroke="#5BA3E0" stroke-width="1.3" points="200 210 280 250 280 330 200 370 120 330 120 250"/><line x1="200" x2="200" y1="210" y2="290" stroke="#5BA3E0" stroke-width=".8"/><line x1="200" x2="120" y1="290" y2="250" stroke="#5BA3E0" stroke-width=".8"/><line x1="200" x2="280" y1="290" y2="250" stroke="#5BA3E0" stroke-width=".8"/><rect width="90" height="14" x="155" y="270" fill="none" stroke="#FFB627" stroke-width=".8"/><text x="200" y="281" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">apiserver</text><rect width="90" height="14" x="155" y="288" fill="none" stroke="#FFB627" stroke-width=".8"/><text x="200" y="299" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">etcd</text><text x="200" y="395" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="middle">host-01</text></g><g id="stacked-host-2"><polygon fill="#0E2A47" stroke="#5BA3E0" stroke-width="1.3" points="360 210 440 250 440 330 360 370 280 330 280 250"/><line x1="360" x2="360" y1="210" y2="290" stroke="#5BA3E0" stroke-width=".8"/><line x1="360" x2="280" y1="290" y2="250" stroke="#5BA3E0" stroke-width=".8"/><line x1="360" x2="440" y1="290" y2="250" stroke="#5BA3E0" stroke-width=".8"/><rect width="90" height="14" x="315" y="270" fill="none" stroke="#FFB627" stroke-width=".8"/><text x="360" y="281" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">apiserver</text><rect width="90" height="14" x="315" y="288" fill="none" stroke="#FFB627" stroke-width=".8"/><text x="360" y="299" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">etcd</text><text x="360" y="395" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="middle">host-02</text></g><g id="stacked-host-3"><polygon fill="#0E2A47" stroke="#5BA3E0" stroke-width="1.3" points="520 210 600 250 600 330 520 370 440 330 440 250"/><line x1="520" x2="520" y1="210" y2="290" stroke="#5BA3E0" stroke-width=".8"/><line x1="520" x2="440" y1="290" y2="250" stroke="#5BA3E0" stroke-width=".8"/><line x1="520" x2="600" y1="290" y2="250" stroke="#5BA3E0" stroke-width=".8"/><rect width="90" height="14" x="475" y="270" fill="none" stroke="#FFB627" stroke-width=".8"/><text x="520" y="281" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">apiserver</text><rect width="90" height="14" x="475" y="288" fill="none" stroke="#FFB627" stroke-width=".8"/><text x="520" y="299" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">etcd</text><text x="520" y="395" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="middle">host-03</text></g><path fill="none" stroke="#FFB627" stroke-dasharray="2 2" stroke-width=".8" d="M 200,330 Q 360,355 360,330"/><path fill="none" stroke="#FFB627" stroke-dasharray="2 2" stroke-width=".8" d="M 360,330 Q 520,355 520,330"/><g id="stacked-tradeoffs"><line x1="100" x2="620" y1="430" y2="430" stroke="#5BA3E0" stroke-width=".5"/><text x="100" y="455" fill="#7FD99F" font-family="Consolas, 'Courier New', monospace" font-size="11">▲ TRADE-OFFS</text><text x="100" y="478" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12">+ Fewer hosts to maintain</text><text x="100" y="497" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12">+ Lower infrastructure cost</text><text x="100" y="516" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12">+ Simpler kubeadm setup</text><text x="100" y="544" fill="#FF6B6B" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12">− Host loss kills 1 apiserver AND 1 etcd</text><text x="100" y="563" fill="#FF6B6B" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12">− Less failure isolation</text><text x="100" y="582" fill="#FF6B6B" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12">− etcd I/O shares disk with apiserver</text></g></g><g id="external-topology"><rect width="560" height="500" x="680" y="110" fill="#1A3A5C" fill-opacity=".3" stroke="#FFB627" stroke-dasharray="4 4" stroke-width=".8"/><text x="700" y="135" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="14" font-weight="bold">[ TOPOLOGY B ] EXTERNAL ETCD ★</text><text x="700" y="155" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12">etcd cluster on dedicated hosts</text><line x1="680" x2="1240" y1="170" y2="170" stroke="#FFB627" stroke-width=".5"/><text x="700" y="195" fill="#5BA3E0" font-family="Consolas, 'Courier New', monospace" font-size="10">CONTROL PLANE TIER</text><g id="ext-cp-1"><polygon fill="#0E2A47" stroke="#5BA3E0" stroke-width="1.3" points="780 225 850 260 850 330 780 365 710 330 710 260"/><rect width="80" height="14" x="740" y="290" fill="none" stroke="#5BA3E0" stroke-width=".8"/><text x="780" y="301" fill="#5BA3E0" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">apiserver</text><text x="780" y="380" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="10" text-anchor="middle">cp-01</text></g><g id="ext-cp-2"><polygon fill="#0E2A47" stroke="#5BA3E0" stroke-width="1.3" points="940 225 1010 260 1010 330 940 365 870 330 870 260"/><rect width="80" height="14" x="900" y="290" fill="none" stroke="#5BA3E0" stroke-width=".8"/><text x="940" y="301" fill="#5BA3E0" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">apiserver</text><text x="940" y="380" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="10" text-anchor="middle">cp-02</text></g><g id="ext-cp-3"><polygon fill="#0E2A47" stroke="#5BA3E0" stroke-width="1.3" points="1100 225 1170 260 1170 330 1100 365 1030 330 1030 260"/><rect width="80" height="14" x="1060" y="290" fill="none" stroke="#5BA3E0" stroke-width=".8"/><text x="1100" y="301" fill="#5BA3E0" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">apiserver</text><text x="1100" y="380" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="10" text-anchor="middle">cp-03</text></g><line x1="780" x2="780" y1="365" y2="415" stroke="#FFB627" stroke-dasharray="3 3" stroke-width="1"/><line x1="940" x2="940" y1="365" y2="415" stroke="#FFB627" stroke-dasharray="3 3" stroke-width="1"/><line x1="1100" x2="1100" y1="365" y2="415" stroke="#FFB627" stroke-dasharray="3 3" stroke-width="1"/><text x="700" y="402" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="10">ETCD TIER (dedicated)</text><rect width="100" height="50" x="710" y="415" fill="#0E2A47" stroke="#FFB627" stroke-width="1.5"/><text x="760" y="438" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle">etcd</text><text x="760" y="455" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">etcd-01</text><rect width="100" height="50" x="890" y="415" fill="#0E2A47" stroke="#FFB627" stroke-width="1.5"/><text x="940" y="438" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle">etcd</text><text x="940" y="455" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">etcd-02</text><rect width="100" height="50" x="1050" y="415" fill="#0E2A47" stroke="#FFB627" stroke-width="1.5"/><text x="1100" y="438" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle">etcd</text><text x="1100" y="455" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">etcd-03</text><path fill="none" stroke="#FFB627" stroke-dasharray="2 2" stroke-width=".7" d="M 760,440 Q 850,475 940,440"/><path fill="none" stroke="#FFB627" stroke-dasharray="2 2" stroke-width=".7" d="M 940,440 Q 1020,475 1100,440"/><g id="ext-tradeoffs"><line x1="700" x2="1220" y1="490" y2="490" stroke="#FFB627" stroke-width=".5"/><text x="700" y="515" fill="#7FD99F" font-family="Consolas, 'Courier New', monospace" font-size="11">▲ TRADE-OFFS</text><text x="700" y="538" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12">+ Failure isolation across tiers</text><text x="700" y="557" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12">+ etcd survives apiserver disk pressure</text><text x="700" y="576" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12">+ Independent scaling / upgrade paths</text><text x="700" y="595" fill="#FF6B6B" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12">− Double the hosts to operate</text></g></g><g id="ha-rules"><rect width="1160" height="38" x="80" y="625" fill="#1A3A5C" fill-opacity=".6" stroke="#FFB627" stroke-width=".8"/><text x="100" y="649" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13">Universal HA rules — <tspan fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-weight="bold">≥3 control-plane hosts</tspan> · <tspan fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-weight="bold">odd-numbered etcd members (3 or 5)</tspan> · scheduler &amp; controller-manager are <tspan fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-weight="bold">leader-elected</tspan> · spread across availability zones</text></g><g id="footer"><line x1="60" x2="1220" y1="680" y2="680" stroke="#2D4A6B" stroke-width=".5"/><text x="60" y="700" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11">K8S-ARCH-2026 · DRAWING 08 OF 10 · HA TOPOLOGY</text><text x="1220" y="700" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="end">SHEET 08 OF 10</text></g></svg>