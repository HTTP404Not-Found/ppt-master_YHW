<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><pattern id="bpGridMajor" width="40" height="40" x="0" y="0" data-pptx-pattern="lgGrid" patternUnits="userSpaceOnUse"><rect width="40" height="40" fill="#0E2A47"/><path fill="none" stroke="#2D4A6B" stroke-width=".6" d="M 40 0 L 0 0 0 40"/></pattern><pattern id="bpGridMinor" width="8" height="8" x="0" y="0" data-pptx-pattern="smGrid" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#0E2A47"/><path fill="none" stroke="#1A3A5C" stroke-width=".3" d="M 8 0 L 0 0 0 8"/></pattern><marker id="arrow09Cyan" markerHeight="10" markerWidth="10" orient="auto" refX="9" refY="5"><path fill="#5BA3E0" d="M 0,0 L 10,5 L 0,10 Z"/></marker><marker id="arrow09Amber" markerHeight="10" markerWidth="10" orient="auto" refX="9" refY="5"><path fill="#FFB627" d="M 0,0 L 10,5 L 0,10 Z"/></marker><radialGradient id="apiGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFB627" stop-opacity=".25"/><stop offset="100%" stop-color="#FFB627" stop-opacity="0"/></radialGradient></defs><g id="bg"><rect width="1280" height="720" fill="#0E2A47"/><rect width="1280" height="720" fill="url(#bpGridMinor)" opacity=".4"/><rect width="1280" height="720" fill="url(#bpGridMajor)" opacity=".6"/></g><g id="header"><text x="60" y="42" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="bold">Every Line Crosses the API Server</text><text x="1220" y="42" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="end">P09 / 10</text><line x1="60" x2="1220" y1="58" y2="58" stroke="#2D4A6B" stroke-width=".5"/><text x="60" y="78" fill="#6B85A3" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13">NO COMPONENT TALKS DIRECTLY TO ANOTHER — ALL FLOWS GO THROUGH kube-apiserver</text></g><g id="lane-labels"><text x="180" y="115" fill="#5BA3E0" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="middl