>kube-scheduler</text><text x="130" y="268" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10">picks node for Pod</text></g><g id="cli-ctrl"><rect width="200" height="56" x="80" y="295" fill="#0E2A47" stroke="#5BA3E0" stroke-width="1.3"/><rect width="4" height="56" x="80" y="295" fill="#5BA3E0"/><g fill="none" stroke="#5BA3E0" stroke-width="1.5"><path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4" transform="translate(96.0, 310.0)"/><path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4" transform="translate(96.0, 310.0)"/></g><text x="130" y="320" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="11" font-weight="bold">controller-mgr</text><text x="130" y="338" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10">reconcile loops</text></g><g id="cli-kubelet"><rect width="200" height="56" x="80" y="365" fill="#0E2A47" stroke="#5BA3E0" stroke-width="1.3"/><rect width="4" height="56" x="80" y="365" fill="#5BA3E0"/><g fill="none" stroke="#5BA3E0" stroke-width="1.5"><path d="M21 16.008v-8.018a1.98 1.98 0 0 0 -1 -1.717l-7 -4.008a2.016 2.016 0 0 0 -2 0l-7 4.008c-.619 .355 -1 1.01 -1 1.718v8.018c0 .709 .381 1.363 1 1.717l7 4.008a2.016 2.016 0 0 0 2 0l7 -4.008c.619 -.355 1 -1.01 1 -1.718" transform="translate(96.0, 380.0)"/><path d="M12 22v-10" transform="translate(96.0, 380.0)"/><path d="M12 12l8.73 -5.04" transform="translate(96.0, 380.0)"/><path d="M3.27 6.96l8.73 5.04" transform="translate(96.0, 380.0)"/></g><text x="130" y="390" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="12" font-weight="bold">kubelet (node)</text><text x="130" y="408" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10">node-side agent · ≥1 per node</text></g><g id="cli-proxy"><rect width="200" height="56" x="80" y="435" fill="#0E2A47" stroke="#5BA3E0" stroke-width="1.3"/><rect width="4" height="56" x="80" y="435" fill="#5BA3E0"/><g fill="none" stroke="#5BA3E0" stroke-width="1.5"><path d="M3 19a2 2 0 1 0 4 0a2 2 0 0 0 -4 0" transform="translate(96.0, 450.0)"/><path d="M19 7a2 2 0 1 0 0 -4a2 2 0 0 0 0 4" transform="translate(96.0, 450.0)"/><path d="M11 19h5.5a3.5 3.5 0 0 0 0 -7h-8a3.5 3.5 0 0 1 0 -7h4.5" transform="translate(96.0, 450.0)"/></g><text x="130" y="460" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="12" font-weight="bold">kube-proxy</text><text x="130" y="478" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10">Service rule programmer</text></g><g id="cli-cloud"><rect width="200" height="56" x="80" y="505" fill="#0E2A47" stroke="#3E7AB8" stroke-dasharray="4 3" stroke-width="1.2"/><rect width="4" height="56" x="80" y="505" fill="#3E7AB8"/><g fill="none" stroke="#3E7AB8" stroke-width="1.5"><path d="M6.657 18c-2.572 0 -4.657 -2.007 -4.657 -4.483c0 -2.475 2.085 -4.482 4.657 -4.482c.393 -1.762 1.794 -3.2 3.675 -3.773c1.88 -.572 3.956 -.193 5.444 1c1.488 1.19 2.162 3.007 1.77 4.769h.99c1.913 0 3.464 1.56 3.464 3.486c0 1.927 -1.551 3.487 -3.465 3.487h-11.878" transform="translate(96.0, 520.0)"/></g><text x="130" y="530" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="11" font-weight="bold">cloud-ctrl-mgr</text><text x="130" y="548" fill="#6B85A3" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10">optional · cloud only</text></g><g id="api-spine"><circle cx="640" cy="360" r="180" fill="url(#apiGlow)"/><rect width="200" height="360" x="540" y="180" fill="#0E2A47" stroke="#FFB627" stroke-width="2"/><rect width="200" height="36" x="540" y="180" fill="#FFB627"/><text x="640" y="204" fill="#0E2A47" font-family="Consolas, 'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">★ SPINE</text><text x="640" y="245" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="16" font-weight="bold" text-anchor="middle">kube-apiserver</text><line x1="560" x2="720" y1="263" y2="263" stroke="#FFB627" stroke-width=".5"/><text x="640" y="290" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" text-anchor="middle">REST API surface</text><text x="640" y="310" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">• authn / authz</text><text x="640" y="328" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">• admission webhooks</text><text x="640" y="346" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">• validation</text><text x="640" y="364" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">• mutation</text><line x1="560" x2="720" y1="380" y2="380" stroke="#FFB627" stroke-width=".5"/><text x="640" y="406" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="middle">scales horizontally</text><text x="640" y="424" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">N replicas behind LB</text><line x1="560" x2="720" y1="445" y2="445" stroke="#FFB627" stroke-width=".5"/><text x="640" y="471" fill="#7FD99F" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="middle">watch · long-poll</text><text x="640" y="489" fill="#7FD99F" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="middle">+ list streams</text><text x="640" y="513" fill="#6B85A3" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10" text-anchor="middle">every component watches</text><text x="640" y="528" fill="#6B85A3" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10" text-anchor="middle">to drive its reconcile loop</text></g><g id="persistence-column"><rect width="200" height="140" x="1000" y="290" fill="#0E2A47" stroke="#FFB627" stroke-width="2"/><rect width="200" height="30" x="1000" y="290" fill="#FFB627"/><text x="1100" y="310" fill="#0E2A47" font-family="Consolas, 'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle">SOLE STORAGE</text><g fill="none" stroke="#FFB627" stroke-width="1.5"><path d="M4 6a8 3 0 1 0 16 0a8 3 0 1 0 -16 0" transform="translate(1018.0, 335.0) scale(1.4166666666666667)"/><path d="M4 6v6a8 3 0 0 0 16 0v-6" transform="translate(1018.0, 335.0) scale(1.4166666666666667)"/><path d="M4 12v6a8 3 0 0 0 16 0v-6" transform="translate(1018.0, 335.0) scale(1.4166666666666667)"/></g><text x="1100" y="358" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="16" font-weight="bold" text-anchor="middle">etcd</text><text x="1100" y="380" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">Raft K/V cluster</text><text x="1100" y="398" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">all cluster state</text><line x1="1018" x2="1182" y1="410" y2="410" stroke="#FFB627" stroke-width=".4"/><text x="1100" y="424" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">3 or 5 members · odd</text></g><g id="watch-arrows"><line x1="280" x2="540" y1="183" y2="218" stroke="#5BA3E0" stroke-width="1.5" marker-end="url(#arrow09Cyan)"/><text x="295" y="173" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="9">POST · PUT</text><line x1="280" x2="540" y1="253" y2="263" stroke="#5BA3E0" stroke-width="1.5" marker-end="url(#arrow09Cyan)"/><text x="305" y="244" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="9">watch unscheduled</text><line x1="540" x2="280" y1="290" y2="270" stroke="#7FD99F" stroke-width="1.2" marker-end="url(#arrow09Cyan)"/><text x="338" y="285" fill="#7FD99F" font-family="Consolas, 'Courier New', monospace" font-size="9">bind decision</text><line x1="280" x2="540" y1="323" y2="333" stroke="#5BA3E0" stroke-width="1.5" marker-end="url(#arrow09Cyan)"/><text x="320" y="316" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="9">watch + patch</text><line x1="280" x2="540" y1="393" y2="403" stroke="#5BA3E0" stroke-width="1.5" marker-end="url(#arrow09Cyan)"/><text x="320" y="386" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="9">watch pods/node</text><line x1="540" x2="280" y1="425" y2="420" stroke="#7FD99F" stroke-width="1.2" marker-end="url(#arrow09Cyan)"/><text x="380" y="418" fill="#7FD99F" font-family="Consolas, 'Courier New', monospace" font-size="9">report status</text><line x1="280" x2="540" y1="463" y2="475" stroke="#5BA3E0" stroke-width="1.5" marker-end="url(#arrow09Cyan)"/><text x="318" y="456" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="9">watch services</text><line x1="280" x2="540" y1="533" y2="510" stroke="#3E7AB8" stroke-dasharray="4 3" stroke-width="1.2" marker-end="url(#arrow09Cyan)"/><text x="320" y="523" fill="#3E7AB8" font-family="Consolas, 'Courier New', monospace" font-size="9">cloud sync (optional)</text><line x1="740" x2="1000" y1="345" y2="345" stroke="#FFB627" stroke-width="2" marker-end="url(#arrow09Amber)"/><line x1="1000" x2="740" y1="375" y2="375" stroke="#FFB627" stroke-width="2" marker-end="url(#arrow09Amber)"/><text x="870" y="335" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="middle">gRPC · write</text><text x="870" y="395" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="middle">gRPC · read</text></g><g id="bottom-takeaway"><rect width="1160" height="74" x="60" y="588" fill="#1A3A5C" fill-opacity=".6" stroke="#FFB627" stroke-width="1"/><g fill="none" stroke="#FFB627" stroke-width="1.5"><path d="M3 19a2 2 0 1 0 4 0a2 2 0 0 0 -4 0" transform="translate(76.0, 608.0) scale(1.3333333333333333)"/><path d="M19 7a2 2 0 1 0 0 -4a2 2 0 0 0 0 4" transform="translate(76.0, 608.0) scale(1.3333333333333333)"/><path d="M11 19h5.5a3.5 3.5 0 0 0 0 -7h-8a3.5 3.5 0 0 1 0 -7h4.5" transform="translate(76.0, 608.0) scale(1.3333333333333333)"/></g><text x="120" y="615" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="13" font-weight="bold">WHY THIS MATTERS</text><text x="120" y="638" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13">API-mediation makes Kubernetes <tspan fill="#FFB627" font-weight="bold">pluggable</tspan> (any controller can join the loop by watching the API), <tspan fill="#FFB627" font-weight="bold">observable</tspan> (every state change is an API event), and <tspan fill="#FFB627" font-weight="bold">auditable</tspan>.</text><text x="120" y="656" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12">The constraint <tspan fill="#FFB627" font-family="Consolas, 'Courier New', monospace">&quot;all roads through apiserver&quot;</tspan> is the architecture, not an inconvenience.</text></g><g id="footer"><line x1="60" x2="1220" y1="680" y2="680" stroke="#2D4A6B" stroke-width=".5"/><text x="60" y="700" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11">K8S-ARCH-2026 · DRAWING 09 OF 10 · API SPINE</text><text x="1220" y="700" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="end">SHEET 09 OF 10</text></g></svg>