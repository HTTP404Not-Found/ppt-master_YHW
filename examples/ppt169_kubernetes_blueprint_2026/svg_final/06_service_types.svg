 y="512" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="10">▼ Use when</text><text x="120" y="530" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">Backend services</text><text x="120" y="546" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">internal APIs</text><line x1="120" x2="240" y1="580" y2="580" stroke="#2D4A6B" stroke-width=".5"/><text x="180" y="610" fill="#5BA3E0" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">DEFAULT</text><text x="180" y="624" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">90% of services</text></g><g id="pillar-nodeport"><line x1="465" x2="465" y1="125" y2="650" stroke="#5BA3E0" stroke-dasharray="2 4" stroke-width=".4" opacity=".5"/><polygon fill="#5BA3E0" points="465 125 460 135 470 135"/><rect width="160" height="500" x="385" y="150" fill="#1A3A5C" fill-opacity=".35" stroke="#5BA3E0" stroke-width="1.5"/><rect width="160" height="32" x="385" y="150" fill="#5BA3E0"/><text x="465" y="171" fill="#0E2A47" font-family="Consolas, 'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">TYPE 02</text><text x="465" y="208" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="17" font-weight="bold" text-anchor="middle">NodePort</text><line x1="405" x2="525" y1="222" y2="222" stroke="#5BA3E0" stroke-width=".6"/><text x="465" y="244" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">static port on</text><text x="465" y="258" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">every node IP</text><line x1="405" x2="525" y1="280" y2="280" stroke="#2D4A6B" stroke-width=".5"/><text x="405" y="302" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="10">▼ Where</text><text x="405" y="320" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">External via</text><text x="405" y="336" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="11">NodeIP : NodePort</text><text x="405" y="372" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="10">▼ Port range</text><text x="405" y="390" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="14" font-weight="bold">30000-32767</text><text x="405" y="406" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10">default range</text><text x="405" y="442" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="10">▼ Stack</text><text x="405" y="460" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">opens on all nodes</text><text x="405" y="476" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">→ ClusterIP → Pod</text><text x="405" y="512" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="10">▼ Use when</text><text x="405" y="530" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">No cloud LB</text><text x="405" y="546" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">dev / on-prem</text><line x1="405" x2="525" y1="580" y2="580" stroke="#2D4A6B" stroke-width=".5"/><text x="465" y="610" fill="#5BA3E0" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">L4 EXPOSURE</text><text x="465" y="624" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">no LB needed</text></g><g id="pillar-loadbalancer"><line x1="750" x2="750" y1="125" y2="650" stroke="#FFB627" stroke-dasharray="2 4" stroke-width=".4" opacity=".6"/><polygon fill="#FFB627" points="750 125 745 135 755 135"/><rect width="160" height="500" x="670" y="150" fill="#1A3A5C" fill-opacity=".35" stroke="#FFB627" stroke-width="2"/><rect width="160" height="32" x="670" y="150" fill="#FFB627"/><text x="750" y="171" fill="#0E2A47" font-family="Consolas, 'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">TYPE 03 · CLOUD</text><text x="750" y="208" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="15" font-weight="bold" text-anchor="middle">LoadBalancer</text><line x1="690" x2="810" y1="222" y2="222" stroke="#FFB627" stroke-width=".6"/><text x="750" y="244" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">cloud LB with</text><text x="750" y="258" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">external IP</text><line x1="690" x2="810" y1="280" y2="280" stroke="#2D4A6B" stroke-width=".5"/><text x="690" y="302" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="10">▼ Where</text><text x="690" y="320" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">Public Internet</text><text x="690" y="336" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">cloud LB DNS</text><text x="690" y="372" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="10">▼ Provisioned by</text><text x="690" y="390" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="11">cloud-ctrl-mgr</text><text x="690" y="406" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10">AWS ELB · GCP LB</text><text x="690" y="442" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="10">▼ Stack</text><text x="690" y="460" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">LB → NodePort</text><text x="690" y="476" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">→ ClusterIP → Pod</text><text x="690" y="512" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="10">▼ Use when</text><text x="690" y="530" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">Public-facing app</text><text x="690" y="546" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">requires cloud</text><line x1="690" x2="810" y1="580" y2="580" stroke="#2D4A6B" stroke-width=".5"/><text x="750" y="610" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">▲ PRODUCTION</text><text x="750" y="624" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">canonical pattern</text></g><g id="pillar-externalname"><line x1="1035" x2="1035" y1="125" y2="650" stroke="#3E7AB8" stroke-dasharray="2 4" stroke-width=".4" opacity=".5"/><polygon fill="#3E7AB8" points="1035 125 1030 135 1040 135"/><rect width="160" height="500" x="955" y="150" fill="#1A3A5C" fill-opacity=".35" stroke="#3E7AB8" stroke-dasharray="5 3" stroke-width="1.3"/><rect width="160" height="32" x="955" y="150" fill="#3E7AB8"/><text x="1035" y="171" fill="#0E2A47" font-family="Consolas, 'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle">TYPE 04 · DNS ONLY</text><text x="1035" y="208" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="middle">ExternalName</text><line x1="975" x2="1095" y1="222" y2="222" stroke="#3E7AB8" stroke-width=".6"/><text x="1035" y="244" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">CNAME alias to</text><text x="1035" y="258" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">external DNS</text><line x1="975" x2="1095" y1="280" y2="280" stroke="#2D4A6B" stroke-width=".5"/><text x="975" y="302" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="10">▼ Where</text><text x="975" y="320" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">Outside cluster</text><text x="975" y="336" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">via DNS resolution</text><text x="975" y="372" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="10">▼ Mechanism</text><text x="975" y="390" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">DNS CNAME record</text><text x="975" y="406" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">no kube-proxy</text><text x="975" y="442" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="10">▼ Selector</text><text x="975" y="460" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">none required</text><text x="975" y="476" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">no backing Pods</text><text x="975" y="512" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="10">▼ Use when</text><text x="975" y="530" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">External DB / API</text><text x="975" y="546" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">migration shim</text><line x1="975" x2="1095" y1="580" y2="580" stroke="#2D4A6B" stroke-width=".5"/><text x="1035" y="610" fill="#3E7AB8" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">NO PROXYING</text><text x="1035" y="624" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">edge case only</text></g><g id="footer"><line x1="60" x2="1220" y1="680" y2="680" stroke="#2D4A6B" stroke-width=".5"/><text x="60" y="700" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11">K8S-ARCH-2026 · DRAWING 06 OF 10 · SERVICE TYPES</text><text x="1220" y="700" fill="#6B85A3" font-family="Consolas, 'Courier N