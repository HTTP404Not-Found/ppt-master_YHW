<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><pattern id="bpGridMajor" width="40" height="40" x="0" y="0" data-pptx-pattern="lgGrid" patternUnits="userSpaceOnUse"><rect width="40" height="40" fill="#0E2A47"/><path fill="none" stroke="#2D4A6B" stroke-width=".6" d="M 40 0 L 0 0 0 40"/></pattern><pattern id="bpGridMinor" width="8" height="8" x="0" y="0" data-pptx-pattern="smGrid" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#0E2A47"/><path fill="none" stroke="#1A3A5C" stroke-width=".3" d="M 8 0 L 0 0 0 8"/></pattern><marker id="arrowCyan" markerHeight="10" markerWidth="10" orient="auto" refX="9" refY="5"><path fill="#5BA3E0" d="M 0,0 L 10,5 L 0,10 Z"/></marker><marker id="arrowAmber" markerHeight="10" markerWidth="10" orient="auto" refX="9" refY="5"><path fill="#FFB627" d="M 0,0 L 10,5 L 0,10 Z"/></marker><marker id="arrowWarn" markerHeight="10" markerWidth="10" orient="auto" refX="9" refY="5"><path fill="#FF6B6B" d="M 0,0 L 10,5 L 0,10 Z"/></marker></defs><g id="bg"><rect width="1280" height="720" fill="#0E2A47"/><rect width="1280" height="720" fill="url(#bpGridMinor)" opacity=".4"/><rect width="1280" height="720" fill="url(#bpGridMajor)" opacity=".6"/></g><g id="header"><text x="60" y="42" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="bold">Pod Lifecycle: One Schedule, Many States</text><text x="1220" y="42" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="end">P05 / 10</text><line x1="60" x2="1220" y1="58" y2="58" stroke="#2D4A6B" stroke-width=".5"/><text x="60" y="78" fill="#6B85A3" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13">A POD IS SCHEDULED ONCE · FAILED PODS ARE REPLACED, NOT RESCHEDULED</text></g><g id="phase-track"><text x="100" y="200" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11">PHASE TRACK</text><line x1="60" x2="1220" y1="215" y2="215" stroke="#2D4A6B" stroke-dasharray="2 4" stroke-width=".5"/><g id="phase-pending"><rect width="180" height="100" x="100" y="240" fill="#0E2A47" stroke="#5BA3E0" stroke-width="1.5"/><rect width="180" height="22" x="100" y="240" fill="#5BA3E0"/><text x="190" y="257" fill="#0E2A47" font-family="Consolas, 'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle">PHASE 01</text><text x="190" y="287" fill="#F0F4F8" font-family="Consolas, 'Courier New', monospace" font-size="16" font-weight="bold" text-anchor="middle">Pending</text><text x="190" y="308" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">scheduling</text><text x="190" y="324" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">+ image pull</text></g><line x1="280" x2="370" y1="290" y2="290" stroke="#5BA3E0" stroke-width="2" marker-end="url(#arrowCyan)"/><text x="325" y="278" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">bind+pull</text><g id="phase-running"><rect width="200" height="100" x="380" y="240" fill="#0E2A47" stroke="#FFB627" stroke-width="2"/><rect width="200" height="22" x="380" y="240" fill="#FFB627"/><text x="480" y="257" fill="#0E2A47" font-family="Consolas, 'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle">PHASE 02 · CURRENT</text><text x="480" y="287" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="16" font-weight="bold" text-anchor="middle">Running</text><text x="480" y="308" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">≥1 container live</text><text x="480" y="324" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">probes active</text></g><line x1="580" x2="700" y1="270" y2="270" stroke="#5BA3E0" stroke-width="2" marker-end="url(#arrowCyan)"/><line x1="580" x2="700" y1="310" y2="310" stroke="#5BA3E0" stroke-width="2" marker-end="url(#arrowCyan)"/><text x="640" y="262" fill="#7FD99F" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">exit 0</text><text x="640" y="328" fill="#FF6B6B" font-family="Consolas, 'Courier New', monospace" font-size="9" text-anchor="middle">exit ≠ 0</text><g id="phase-succeeded"><rect width="180" height="60" x="710" y="220" fill="#0E2A47" stroke="#7FD99F" stroke-width="1.5"/><rect width="180" height="20" x="710" y="220" fill="#7FD99F"/><text x="800" y="234" fill="#0E2A47" font-family="Consolas, 'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="middle">TERMINAL ✓</text><text x="800" y="262" fill="#7FD99F" font-family="Consolas, 'Courier New', monospace" font-size="15" font-weight="bold" text-anchor="middle">Succeeded</text></g><g id="phase-failed"><rect width="180" height="60" x="710" y="300" fill="#0E2A47" stroke="#FF6B6B" stroke-width="1.5"/><rect width="180" height="20" x="710" y="300" fill="#FF6B6B"/><text x="800" y="314" fill="#0E2A47" font-family="Consolas, 'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="middle">TERMINAL ✗</text><text x="800" y="342" fill="#FF6B6B" font-family="Consolas, 'Courier New', monospace" font-size="15" font-weight="bold" text-anchor="middle">Failed</text></g><line x1="480" x2="480" y1="340" y2="395" stroke="#FF6B6B" stroke-dasharray="4 3" stroke-width="1.5" marker-end="url(#arrowWarn)"/><g id="phase-unknown"><rect width="220" height="100" x="950" y="240" fill="#0E2A47" stroke="#3E7AB8" stroke-dasharray="5 3" stroke-width="1.3"/><rect width="220" height="22" x="950" y="240" fill="#3E7AB8"/><text x="1060" y="257" fill="#0E2A47" font-family="Consolas, 'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle">BRANCH · NODE UNREACHABLE</text><text x="1060" y="287" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="15" font-weight="bold" text-anchor="middle">Unknown</text><text x="1060" y="308" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">apiserver lost contact</text><text x="1060" y="324" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" text-anchor="middle">with the node</text></g><path fill="none" stroke="#3E7AB8" stroke-dasharray="3 4" stroke-width="1.5" marker-end="url(#arrowCyan)" d="M 580,240 Q 765,175 950,240"/></g><g id="container-states"><text x="100" y="425" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11">CONTAINER-STATE TRACK</text><line x1="60" x2="1220" y1="440" y2="440" stroke="#2D4A6B" stroke-dasharray="2 4" stroke-width=".5"/><g id="state-waiting"><rect width="280" height="70" x="100" y="460" fill="#0E2A47" stroke="#5BA3E0" stroke-width="1.2"/><line x1="100" x2="380" y1="490" y2="490" stroke="#5BA3E0" stroke-width=".6"/><text x="116" y="482" fill="#5BA3E0" font-family="Consolas, 'Courier New', monospace" font-size="13" font-weight="bold">Waiting</text><text x="116" y="510" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">pulling image · applying secrets</text><text x="116" y="524" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">resolving dependencies</text></g><g id="state-running"><rect width="280" height="70" x="400" y="460" fill="#0E2A47" stroke="#FFB627" stroke-width="1.5"/><line x1="400" x2="680" y1="490" y2="490" stroke="#FFB627" stroke-width=".6"/><text x="416" y="482" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="13" font-weight="bold">Running</text><text x="416" y="510" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">executing successfully</text><text x="416" y="524" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="11">.startedAt set</text></g><g id="state-terminated"><rect width="280" height="70" x="700" y="460" fill="#0E2A47" stroke="#3E7AB8" stroke-width="1.2"/><line x1="700" x2="980" y1="490" y2="490" stroke="#3E7AB8" stroke-width=".6"/><text x="716" y="482" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="13" font-weight="bold">Terminated</text><text x="716" y="510" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">exit status · signal recorded</text><text x="716" y="524" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="11">.startedAt · .finishedAt</text></g><line x1="380" x2="400" y1="495" y2="495" stroke="#5BA3E0" stroke-width="1.5" marker-end="url(#arrowCyan)"/><line x1="680" x2="700" y1="495" y2="495" stroke="#5BA3E0" stroke-width="1.5" marker-end="url(#arrowCyan)"/><g id="restart-loop"><rect width="180" height="70" x="1000" y="460" fill="#0E2A47" stroke="#FFB627" stroke-dasharray="3 3" stroke-width="1.2"/><text x="1090" y="482" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle">restartPolicy</text><text x="1090" y="500" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="10" text-anchor="middle">Always · OnFailure</text><text x="1090" y="514" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="10" text-anchor="middle">Never</text><text x="1090" y="528" fill="#FFB627" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10" text-anchor="middle">backoff 100ms → 5min</text></g><path fill="none" stroke="#FFB627" stroke-dasharray="3 3" stroke-width="1" marker-end="url(#arrowAmber)" d="M 1090,460 Q 1090,415 850,415 Q 700,415 700,455"/></g><g id="probes-strip"><text x="100" y="585" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11">PROBE GATES</text><line x1="60" x2="1220" y1="600" y2="600" stroke="#2D4A6B" stroke-dasharray="2 4" stroke-width=".5"/><rect width="350" height="40" x="100" y="615" fill="none" stroke="#5BA3E0" stroke-width="1"/><text x="115" y="640" fill="#5BA3E0" font-family="Consolas, 'Courier New', monospace" font-size="12" font-weight="bold">startupProbe</text><text x="225" y="640" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">gates liveness + readiness until passing</text><rect width="350" height="40" x="465" y="615" fill="none" stroke="#FFB627" stroke-width="1"/><text x="480" y="640" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="12" font-weight="bold">livenessProbe</text><text x="590" y="640" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">fail → kubelet restarts container</text><rect width="350" height="40" x="830" y="615" fill="none" stroke="#7FD99F" stroke-width="1"/><text x="845" y="640" fill="#7FD99F" font-family="Consolas, 'Courier New', monospace" font-size="12" font-weight="bold">readinessProbe</text><text x="965" y="640" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11">fail → drop from Service endpoints</text></g><g id="footer"><line x1="60" x2="1220" y1="680" y2="680" stroke="#2D4A6B" stroke-width=".5"/><text x="60" y="700" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11">K8S-ARCH-2026 · DRAWING 05 OF 10 · POD LIFECYCLE</text><text x="1220" y="700" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="end">SHEET 05 OF 10</text></g></svg>