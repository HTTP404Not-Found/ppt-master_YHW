<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><pattern id="bpGridMajor" width="40" height="40" x="0" y="0" data-pptx-pattern="lgGrid" patternUnits="userSpaceOnUse"><rect width="40" height="40" fill="#0E2A47"/><path fill="none" stroke="#2D4A6B" stroke-width=".6" d="M 40 0 L 0 0 0 40"/></pattern><pattern id="bpGridMinor" width="8" height="8" x="0" y="0" data-pptx-pattern="smGrid" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#0E2A47"/><path fill="none" stroke="#1A3A5C" stroke-width=".3" d="M 8 0 L 0 0 0 8"/></pattern><radialGradient id="endVignette" cx="50%" cy="50%" r="75%"><stop offset="50%" stop-color="#0E2A47" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity=".5"/></radialGradient></defs><g id="bg"><rect width="1280" height="720" fill="#0E2A47"/><rect width="1280" height="720" fill="url(#bpGridMinor)" opacity=".3"/><rect width="1280" height="720" fill="url(#bpGridMajor)" opacity=".45"/><rect width="1280" height="720" fill="url(#endVignette)"/></g><g id="header"><text x="60" y="42" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="bold">Three Things to Remember</text><text x="1220" y="42" fill="#A0B8D0" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="end">P10 / 10</text><line x1="60" x2="1220" y1="58" y2="58" stroke="#2D4A6B" stroke-width=".5"/></g><g id="takeaway-1"><text x="120" y="200" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="13" letter-spacing="3">01 / ONE SPINE</text><line x1="120" x2="160" y1="215" y2="215" stroke="#FFB627" stroke-width="2"/><text x="120" y="270" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="bold"><tspan fill="#FFB627" font-family="Consolas, 'Courier New', monospace">kube-apiserver</tspan> mediates</text><text x="120" y="312" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="bold">every state change.</text><text x="120" y="345" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16">No component talks to another directly.</text><text x="120" y="367" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16">That constraint is what makes the system pluggable.</text></g><g id="takeaway-2"><text x="120" y="408" fill="#5BA3E0" font-family="Consolas, 'Courier New', monospace" font-size="13" letter-spacing="3">02 / ONE TRUTH</text><line x1="120" x2="160" y1="423" y2="423" stroke="#5BA3E0" stroke-width="2"/><text x="120" y="478" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="bold"><tspan fill="#5BA3E0" font-family="Consolas, 'Courier New', monospace">etcd</tspan> is the only</text><text x="120" y="520" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="bold">persistent store.</text><text x="120" y="553" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16">Lose etcd, lose the cluster. Back it up.</text><text x="120" y="575" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16">Run an odd number. Raft does the rest.</text></g><g id="takeaway-3"><text x="700" y="200" fill="#7FD99F" font-family="Consolas, 'Courier New', monospace" font-size="13" letter-spacing="3">03 / ONE LOOP</text><line x1="700" x2="740" y1="215" y2="215" stroke="#7FD99F" stroke-width="2"/><text x="700" y="270" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="bold">Every controller is the</text><text x="700" y="312" fill="#F0F4F8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="bold">same loop, different scope.</text><text x="700" y="345" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16"><tspan><tspan fill="#7FD99F" font-family="Consolas, 'Courier New', monospace">watch → diff → act</tspan>.</tspan></text><text x="700" y="367" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16">Once you see that, you can read the source of any controller.</text></g><g id="reconcile-diagram"><text x="700" y="408" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11" letter-spacing="2">THE LOOP, DRAWN</text><line x1="700" x2="1180" y1="420" y2="420" stroke="#2D4A6B" stroke-width=".5"/><g id="loop-watch"><circle cx="780" cy="500" r="40" fill="none" stroke="#5BA3E0" stroke-width="1.5"/><text x="780" y="495" fill="#5BA3E0" font-family="Consolas, 'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle">watch</text><text x="780" y="510" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="9" text-anchor="middle">desired</text></g><g id="loop-diff"><circle cx="940" cy="500" r="40" fill="none" stroke="#FFB627" stroke-width="1.5"/><text x="940" y="495" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle">diff</text><text x="940" y="510" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="9" text-anchor="middle">vs actual</text></g><g id="loop-act"><circle cx="1100" cy="500" r="40" fill="none" stroke="#7FD99F" stroke-width="1.5"/><text x="1100" y="495" fill="#7FD99F" font-family="Consolas, 'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle">act</text><text x="1100" y="510" fill="#A0B8D0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="9" text-anchor="middle">converge</text></g><line x1="820" x2="900" y1="500" y2="500" stroke="#5BA3E0" stroke-width="1"/><polygon fill="#5BA3E0" points="900 500 893 496 893 504"/><line x1="980" x2="1060" y1="500" y2="500" stroke="#FFB627" stroke-width="1"/><polygon fill="#FFB627" points="1060 500 1053 496 1053 504"/><path fill="none" stroke="#7FD99F" stroke-dasharray="3 4" stroke-width="1" d="M 1100,540 Q 1100,610 940,610 Q 780,610 780,540"/><polygon fill="#7FD99F" points="780 540 776 548 784 548"/><text x="940" y="630" fill="#7FD99F" font-family="Consolas, 'Courier New', monospace" font-size="10" text-anchor="middle">repeat forever</text></g><g id="divider"><line x1="660" x2="660" y1="160" y2="595" stroke="#2D4A6B" stroke-width=".5"/></g><g id="closing-mark"><line x1="120" x2="180" y1="620" y2="620" stroke="#FFB627" stroke-width="1.5"/><text x="120" y="643" fill="#FFB627" font-family="Consolas, 'Courier New', monospace" font-size="11" letter-spacing="2">— END OF DRAWING SET —</text></g><g id="footer"><line x1="60" x2="1220" y1="680" y2="680" stroke="#2D4A6B" stroke-width=".5"/><text x="60" y="700" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11">K8S-ARCH-2026 · DRAWING 10 OF 10 · TAKEAWAYS</text><text x="1220" y="700" fill="#6B85A3" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="end">REV 1.0 · 2026-05-21</text></g></svg>