<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><filter id="cardShadow" width="120%" height="120%" x="-10%" y="-10%"><feGaussianBlur in="SourceAlpha" stdDeviation="6"/><feOffset dx="0" dy="3"/><feFlood flood-color="#1A365D" flood-opacity=".07"/><feComposite in2="SourceAlpha" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><g id="bg"><rect width="1280" height="720" fill="#FFF"/></g><g id="header"><rect width="6" height="40" x="60" y="56" fill="#3182CE"/><text x="84" y="88" fill="#1A365D" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="36" font-weight="700">One mechanism, three roles in the Transformer</text><text x="84" y="118" fill="#4A5568" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">WHERE ATTENTION SHOWS UP IN THE ARCHITECTURE · §3.2.3</text></g><g id="pillar-enc-self"><rect width="380" height="500" x="60" y="160" fill="#FFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#cardShadow)" rx="14"/><path fill="#1A365D" d="M 74 160 h 352 a 14 14 0 0 1 14 14 v 100 h -380 v -100 a 14 14 0 0 1 14 -14 Z"/><use width="32" height="32" x="80" y="180" fill="#FFF" data-icon="tabler-outline/arrow-back"/><text x="250" y="208" fill="#FFF" fill-opacity=".85" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="14" font-weight="700" letter-spacing="2" text-anchor="middle">ENCODER</text><text x="250" y="240" fill="#FFF" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="22" font-weight="700" text-anchor="middle">Self-Attention</text><text x="80" y="312" fill="#3182CE" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">Q · K · V SOURCE</text><rect width="340" height="48" x="80" y="324" fill="#F5F7FA" rx="6"/><text x="98" y="354" fill="#1A202C" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="14">Q, K, V ← previous encoder layer</text><text x="80" y="406" fill="#1A365D" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="18" font-weight="700">Every position attends to all</text><text x="80" y="442" fill="#1A202C" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="15">Every token in the source sequence can</text><text x="80" y="464" fill="#1A202C" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="15">attend to every other token — including</text><text x="80" y="486" fill="#1A202C" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="15">itself.</text><text x="80" y="534" fill="#3182CE" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">WHAT IT&apos;S FOR</text><text x="80" y="560" fill="#4A5568" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="15">Build rich contextualized</text><text x="80" y="582" fill="#4A5568" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="15">representations of each source</text><text x="80" y="604" fill="#4A5568" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="15">token from its surroundings.</text><rect width="340" height="20" x="80" y="624" fill="#1A365D" fill-opacity=".08" rx="4"/><text x="92" y="640" fill="#1A365D" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="12">attention_mask = none</text></g><g id="pillar-dec-masked"><rect width="380" height="500" x="450" y="160" fill="#FFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#cardShadow)" rx="14"/><path fill="#3182CE" d="M 464 160 h 352 a 14 14 0 0 1 14 14 v 100 h -380 v -100 a 14 14 0 0 1 14 -14 Z"/><use width="32" height="32" x="470" y="180" fill="#FFF" data-icon="tabler-outline/lock"/><text x="640" y="208" fill="#FFF" fill-opacity=".9" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="14" font-weight="700" letter-spacing="2" text-anchor="middle">DECODER</text><text x="640" y="240" fill="#FFF" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="22" font-weight="700" text-anchor="middle">Masked Self-Attention</text><text x="470" y="312" fill="#3182CE" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">Q · K · V SOURCE</text><rect width="340" height="48" x="470" y="324" fill="#F5F7FA" rx="6"/><text x="488" y="354" fill="#1A202C" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="14">Q, K, V ← previous decoder layer</text><text x="470" y="406" fill="#1A365D" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="18" font-weight="700">Only past, never future</text><text x="470" y="442" fill="#1A202C" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="15">Position i attends only to positions ≤ i.</text><text x="470" y="464" fill="#1A202C" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="15">Achieved by setting illegal positions to</text><text x="470" y="486" fill="#1A202C" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="14">−∞ before the softmax.</text><text x="470" y="534" fill="#3182CE" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">WHAT IT&apos;S FOR</text><text x="470" y="560" fill="#4A5568" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="15">Preserve auto-regression — the</text><text x="470" y="582" fill="#4A5568" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="15">model cannot peek at tokens it</text><text x="470" y="604" fill="#4A5568" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="15">hasn&apos;t produced yet.</text><rect width="340" height="20" x="470" y="624" fill="#3182CE" fill-opacity=".1" rx="4"/><text x="482" y="640" fill="#3182CE" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="12">attention_mask = causal triangular</text></g><g id="pillar-cross"><rect width="380" height="500" x="840" y="160" fill="#FFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#cardShadow)" rx="14"/><path fill="#1A365D" d="M 854 160 h 352 a 14 14 0 0 1 14 14 v 100 h -380 v -100 a 14 14 0 0 1 14 -14 Z"/><use width="32" height="32" x="860" y="180" fill="#FFF" data-icon="tabler-outline/arrows-left-right"/><text x="1030" y="208" fill="#FFF" fill-opacity=".85" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="14" font-weight="700" letter-spacing="2" text-anchor="middle">ENCODER ↔ DECODER</text><text x="1030" y="240" fill="#FFF" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="22" font-weight="700" text-anchor="middle">Cross-Attention</text><text x="860" y="312" fill="#3182CE" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">Q · K · V SOURCE</text><rect width="340" height="48" x="860" y="324" fill="#F5F7FA" rx="6"/><text x="878" y="346" fill="#1A202C" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="13">Q ← previous decoder layer</text><text x="878" y="364" fill="#3182CE" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="13">K, V ← encoder output</text><text x="860" y="406" fill="#1A365D" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="18" font-weight="700">Look back at the input</text><text x="860" y="442" fill="#1A202C" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="15">Every decoder position can attend over</text><text x="860" y="464" fill="#1A202C" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="15">all positions of the input sequence —</text><text x="860" y="486" fill="#1A202C" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="15">the classic seq2seq attention role.</text><text x="860" y="534" fill="#3182CE" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">WHAT IT&apos;S FOR</text><text x="860" y="560" fill="#4A5568" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="15">Let each output token retrieve</text><text x="860" y="582" fill="#4A5568" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="15">the relevant source information,</text><text x="860" y="604" fill="#4A5568" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="15">no matter where it sits.</text><rect width="340" height="20" x="860" y="624" fill="#1A365D" fill-opacity=".08" rx="4"/><text x="872" y="640" fill="#1A365D" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="12">attention_mask = none</text></g><g id="footer"><text x="60" y="694" fill="#A0AEC0" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="11">Source: Vaswani et al. 2017, §3.2.3 Applications of Attention</text><text x="1220" y="694" fill="#A0AEC0" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="11" text-anchor="end">09</text></g></svg>